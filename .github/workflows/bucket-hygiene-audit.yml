name: Bucket hygiene audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  UV_CACHE_DIR: .uv-cache

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Bucket hygiene audit may only use production read-only auth from main." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate read-only GCP auth configuration
        env:
          GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_READONLY_SERVICE_ACCOUNT: ${{ vars.GCP_READONLY_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${GCP_READONLY_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_READONLY_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_READONLY_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run bucket compliance audit
        run: |
          set +e
          uv run python .claude/skills/shared-datasets-compliance-audit/scripts/audit_shared_datasets.py \
            --health-profile production \
            --format markdown \
            > bucket-hygiene-audit.md
          status=$?
          cat bucket-hygiene-audit.md >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
