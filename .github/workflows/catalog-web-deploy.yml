name: Catalog web deploy

on:
  workflow_run:
    workflows:
      - Feature metadata localization materialization
      - Release index rebuild
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  PUBLISHER_SERVICE_ACCOUNT: shared-datasets-publisher@shared-datasets-1.iam.gserviceaccount.com
  SHARED_DATASETS_ALLOW_CANONICAL_MUTATION: "1"
  CATALOG_WEB_CACHE_CONTROL: "no-cache, max-age=0, must-revalidate"
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    name: Build and publish catalog web
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    concurrency:
      group: catalog-web-deploy
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Catalog web deploy may only publish from main after reviewed changes have landed." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check generated catalog docs
        run: uv run python scripts/catalog_docs.py check

      - name: Run focused catalog tests
        run: |
          uv run pytest \
            tests/test_catalog_site.py \
            tests/test_catalog_web_pmtiles_js.py \
            tests/test_catalog_web_publish.py \
            tests/test_catalog_web_workflows.py

      - name: Check browser JavaScript syntax
        run: |
          node --check web/catalog/app.js
          node --check web/catalog/map-preview.js

      - name: Validate publisher auth configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.PUBLISHER_SERVICE_ACCOUNT }}

      - name: Collect release indexes
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/release-indexes"
          if gcloud storage ls "gs://${SHARED_DATASETS_BUCKET}/_catalog/releases/*.json" >/dev/null 2>&1; then
            gcloud storage cp "gs://${SHARED_DATASETS_BUCKET}/_catalog/releases/*.json" "${RUNNER_TEMP}/release-indexes/"
          else
            echo "No release indexes found; building catalog without release history."
          fi

      - name: Build catalog web bundle
        run: |
          uv run python scripts/catalog_site.py \
            --release-index-dir "${RUNNER_TEMP}/release-indexes" \
            --latest-from-release-index \
            --out "${RUNNER_TEMP}/catalog-web"

      - name: Publish catalog web bundle
        run: |
          uv run python scripts/catalog_web_publish.py \
            --source "${RUNNER_TEMP}/catalog-web" \
            --destination "gs://${SHARED_DATASETS_BUCKET}/_catalog/web" \
            --catalog-source "catalog/shared-datasets-catalog.csv" \
            --catalog-destination "gs://${SHARED_DATASETS_BUCKET}/_catalog/shared-datasets-catalog.csv" \
            --cache-control "${CATALOG_WEB_CACHE_CONTROL}"
