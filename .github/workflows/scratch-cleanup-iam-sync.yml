name: Scratch cleanup IAM sync

on:
  push:
    branches:
      - main
    paths:
      - "terraform/envs/prod/canonical_mutation_iam.tf"
      - "terraform/envs/prod/variables.tf"
      - "terraform/envs/prod/versions.tf"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  sync:
    name: Apply scratch cleanup IAM sync
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: prod-terraform-state
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Scratch cleanup IAM sync may only apply from main after reviewed changes have landed." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/prod init -input=false

      - name: Terraform plan
        run: |
          terraform -chdir=terraform/envs/prod plan \
            -input=false \
            -refresh=false \
            -out="${RUNNER_TEMP}/scratch-cleanup-iam-sync.tfplan" \
            -target=google_project_iam_custom_role.shared_datasets_publisher_object_lister \
            -target=google_storage_bucket_iam_member.shared_datasets_publisher_object_lister \
            -target=google_storage_bucket_iam_member.shared_datasets_publisher_pending_publish_cleanup_user \
            -var="wdpa_monthly_image=unused-by-scratch-cleanup-iam-sync" \
            -var="sea_ice_daily_image=unused-by-scratch-cleanup-iam-sync" \
            -var="eamlis_monthly_image=unused-by-scratch-cleanup-iam-sync"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/prod show -json "${RUNNER_TEMP}/scratch-cleanup-iam-sync.tfplan" > "${RUNNER_TEMP}/scratch-cleanup-iam-sync.tfplan.json"

      - name: Enforce scratch cleanup IAM resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/scratch-cleanup-iam-sync.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_project_iam_custom_role.shared_datasets_publisher_object_lister",
              "google_storage_bucket_iam_member.shared_datasets_publisher_object_lister",
              "google_storage_bucket_iam_member.shared_datasets_publisher_pending_publish_cleanup_user",
          }

          blocked = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if address in allowed_exact:
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing automatic scratch cleanup IAM sync because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply
        run: terraform -chdir=terraform/envs/prod apply -input=false "${RUNNER_TEMP}/scratch-cleanup-iam-sync.tfplan"
