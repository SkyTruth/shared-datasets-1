name: Deploy Feature Branch to Preview

on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  REGION: us-central1
  ARTIFACT_REGISTRY_REPOSITORY: shared-datasets-jobs
  IMAGE_NAME: metadata-service
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  preview:
    name: Deploy selected branch to feature metadata preview
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: metadata-service-preview
      cancel-in-progress: false

    env:
      PREVIEW_REF: ${{ github.ref_name }}

    steps:
      - name: Validate selected branch
        run: |
          set -euo pipefail

          if [[ -z "${PREVIEW_REF}" ]]; then
            echo "selected workflow ref is required for deploy" >&2
            exit 1
          fi

      - name: Check out preview control plane
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check out selected feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: preview-source

      - name: Record checked-out SHA
        run: echo "PREVIEW_DEPLOY_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
        working-directory: preview-source

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Verify selected feature branch contains metadata service
        run: |
          set -euo pipefail

          test -f preview-source/services/metadata_service/Dockerfile
          if ! grep -q "FEATURE_METADATA_FIRESTORE_DATABASE" preview-source/services/metadata_service/run.py; then
            echo "The selected feature branch must support FEATURE_METADATA_FIRESTORE_DATABASE before it can run in preview." >&2
            exit 1
          fi

      - name: Build preview metadata-service image
        run: |
          set -euo pipefail

          safe_ref="$(printf '%s' "${PREVIEW_REF}" | tr -c 'A-Za-z0-9_.-' '-' | cut -c 1-80)"
          safe_ref="${safe_ref#-}"
          safe_ref="${safe_ref%-}"
          if [[ -z "${safe_ref}" ]]; then
            safe_ref="ref"
          fi

          image_tag="${REGION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:preview-${safe_ref}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker build \
            --platform linux/amd64 \
            -f preview-source/services/metadata_service/Dockerfile \
            -t "${image_tag}" \
            preview-source
          docker push "${image_tag}"
          image_digest="$(gcloud artifacts docker images describe "${image_tag}" --format='value(image_summary.fully_qualified_digest)')"
          if [[ -z "${image_digest}" || "${image_digest}" != *@sha256:* ]]; then
            echo "Could not resolve immutable image digest for ${image_tag}" >&2
            exit 1
          fi
          echo "METADATA_SERVICE_IMAGE=${image_digest}" >> "${GITHUB_ENV}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/preview init -input=false

      - name: Terraform reset plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -destroy \
            -input=false \
            -out="${RUNNER_TEMP}/metadata-preview-reset.tfplan"

      - name: Export Terraform reset plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/metadata-preview-reset.tfplan" > "${RUNNER_TEMP}/metadata-preview-reset.tfplan.json"

      - name: Enforce preview reset resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/metadata-preview-reset.tfplan.json" <<'PY'
          import json
          import re
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_storage_bucket.preview_bucket",
              "google_firestore_database.feature_metadata_preview",
              "google_project_iam_member.metadata_service_firestore_viewer",
              "google_project_iam_member.metadata_index_loader_firestore_user",
              "google_storage_bucket_iam_member.metadata_service_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_index_load_creator",
              "google_service_account_iam_member.metadata_index_loader_github_wif",
              "google_cloud_run_v2_service.metadata_service_preview",
              "google_cloud_run_v2_service_iam_member.metadata_service_preview_iap_invoker",
          }
          allowed_patterns = [
              re.compile(r"^module\.metadata_service_account\."),
              re.compile(r"^module\.metadata_index_loader_service_account\."),
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.metadata_service_preview_accessors\["),
          ]

          blocked = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if actions != ["delete"]:
                  blocked.append(f"{'/'.join(actions)} {address}")
              elif address not in allowed_exact and not any(pattern.match(address) for pattern in allowed_patterns):
                  blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing metadata preview reset because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply reset plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/metadata-preview-reset.tfplan"

      - name: Terraform plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -input=false \
            -out="${RUNNER_TEMP}/metadata-preview.tfplan" \
            -var="metadata_service_image=${METADATA_SERVICE_IMAGE}" \
            -var="preview_ref=${PREVIEW_REF}" \
            -var="preview_deploy_sha=${PREVIEW_DEPLOY_SHA}"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/metadata-preview.tfplan" > "${RUNNER_TEMP}/metadata-preview.tfplan.json"

      - name: Enforce preview resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/metadata-preview.tfplan.json" <<'PY'
          import json
          import re
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_storage_bucket.preview_bucket",
              "google_firestore_database.feature_metadata_preview",
              "google_project_iam_member.metadata_service_firestore_viewer",
              "google_project_iam_member.metadata_index_loader_firestore_user",
              "google_storage_bucket_iam_member.metadata_service_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_index_load_creator",
              "google_service_account_iam_member.metadata_index_loader_github_wif",
              "google_cloud_run_v2_service.metadata_service_preview",
              "google_cloud_run_v2_service_iam_member.metadata_service_preview_iap_invoker",
          }
          allowed_patterns = [
              re.compile(r"^module\.metadata_service_account\."),
              re.compile(r"^module\.metadata_index_loader_service_account\."),
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.metadata_service_preview_accessors\["),
          ]
          expected = {
              "bucket": "skytruth-shared-datasets-1-preview",
              "service": "metadata-service-preview",
              "database": "feature-metadata-preview",
              "service_account": "metadata-service-preview",
              "index_loader_service_account": "metadata-index-loader-preview",
          }

          def planned_values(resource):
              change = resource.get("change", {})
              for key in ("after", "before"):
                  value = change.get(key)
                  if isinstance(value, dict):
                      return value
              return {}

          def require_value(violations, address, values, key, expected_value):
              actual = values.get(key)
              if actual is not None and actual != expected_value:
                  violations.append(f"{address} {key} is {actual!r}, expected {expected_value!r}")

          def require_contains(violations, address, values, key, expected_value):
              actual = values.get(key)
              if actual is not None and expected_value not in str(actual):
                  violations.append(f"{address} {key} must contain {expected_value!r}")

          def cloud_run_env(values):
              template = values.get("template") or []
              if not template or not isinstance(template, list):
                  return {}
              containers = template[0].get("containers") or []
              if not containers or not isinstance(containers, list):
                  return {}
              env = containers[0].get("env") or []
              return {item.get("name"): item.get("value") for item in env if isinstance(item, dict)}

          blocked = []
          value_violations = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if address in allowed_exact or any(pattern.match(address) for pattern in allowed_patterns):
                  values = planned_values(resource)
                  if address == "google_storage_bucket.preview_bucket":
                      require_value(value_violations, address, values, "name", expected["bucket"])
                  elif address == "google_firestore_database.feature_metadata_preview":
                      require_value(value_violations, address, values, "name", expected["database"])
                  elif address == "google_cloud_run_v2_service.metadata_service_preview":
                      require_value(value_violations, address, values, "name", expected["service"])
                      env = cloud_run_env(values)
                      if env:
                          if env.get("SHARED_DATASETS_BUCKET") != expected["bucket"]:
                              value_violations.append(f"{address} SHARED_DATASETS_BUCKET must be {expected['bucket']!r}")
                          if env.get("FEATURE_METADATA_FIRESTORE_DATABASE") != expected["database"]:
                              value_violations.append(
                                  f"{address} FEATURE_METADATA_FIRESTORE_DATABASE must be {expected['database']!r}"
                              )
                  elif address == "google_cloud_run_v2_service_iam_member.metadata_service_preview_iap_invoker":
                      require_value(value_violations, address, values, "name", expected["service"])
                  elif address.startswith("google_iap_web_cloud_run_service_iam_member.metadata_service_preview_accessors"):
                      require_value(value_violations, address, values, "cloud_run_service_name", expected["service"])
                  elif address.startswith("module.metadata_service_account."):
                      require_value(value_violations, address, values, "account_id", expected["service_account"])
                  elif address.startswith("module.metadata_index_loader_service_account."):
                      require_value(value_violations, address, values, "account_id", expected["index_loader_service_account"])
                  elif address.startswith("google_storage_bucket_iam_member."):
                      require_value(value_violations, address, values, "bucket", expected["bucket"])
                  elif address.startswith("google_project_iam_member."):
                      condition = values.get("condition") or []
                      if condition and isinstance(condition, list):
                          require_contains(
                              value_violations,
                              address,
                              condition[0],
                              "expression",
                              f"databases/{expected['database']}",
                          )
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing metadata preview because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          if value_violations:
              print("Refusing metadata preview because an allowlisted resource is not constrained to preview names:")
              for item in value_violations:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply preview plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/metadata-preview.tfplan"

      - name: Report preview outputs
        run: |
          terraform -chdir=terraform/envs/preview output metadata_preview_service_uri
          terraform -chdir=terraform/envs/preview output metadata_preview_bucket
          terraform -chdir=terraform/envs/preview output metadata_preview_firestore_database
