name: Deploy Feature Branch to Preview

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy into the preview slot."
        required: true
        default: "main"
        type: string
permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  REGION: us-central1
  ARTIFACT_REGISTRY_REPOSITORY: shared-datasets-jobs
  IMAGE_NAME: preview-service
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  preview:
    name: Deploy selected branch to preview
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: feature-branch-preview
      cancel-in-progress: false

    env:
      PREVIEW_REF: ${{ inputs.ref }}

    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Deploy Feature Branch to Preview must be run from main; pass the feature branch, tag, or SHA in the ref input." >&2
            exit 1
          fi

      - name: Validate selected branch
        run: |
          set -euo pipefail

          if [[ -z "${PREVIEW_REF}" ]]; then
            echo "selected workflow ref is required for deploy" >&2
            exit 1
          fi

      - name: Check out preview control plane
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check out selected feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: preview-source

      - name: Record checked-out SHA
        run: echo "PREVIEW_DEPLOY_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
        working-directory: preview-source

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate preview IAM bootstrap
        run: |
          set -euo pipefail

          preview_service_account="metadata-service-preview@${GOOGLE_CLOUD_PROJECT}.iam.gserviceaccount.com"
          preview_loader_service_account="metadata-index-loader-preview@${GOOGLE_CLOUD_PROJECT}.iam.gserviceaccount.com"
          preview_database="projects/${GOOGLE_CLOUD_PROJECT}/databases/feature-metadata-preview"
          project_number="$(gcloud projects describe "${GOOGLE_CLOUD_PROJECT}" --format='value(projectNumber)')"
          preview_loader_wif_member="principal://iam.googleapis.com/projects/${project_number}/locations/global/workloadIdentityPools/github/subject/repo:SkyTruth/shared-datasets-1:environment:shared-datasets-production"

          missing_bootstrap=0
          if ! gcloud iam service-accounts describe "${preview_service_account}" --project="${GOOGLE_CLOUD_PROJECT}" >/dev/null; then
            echo "Missing preview service account: ${preview_service_account}" >&2
            missing_bootstrap=1
          fi
          if ! gcloud iam service-accounts describe "${preview_loader_service_account}" --project="${GOOGLE_CLOUD_PROJECT}" >/dev/null; then
            echo "Missing preview loader service account: ${preview_loader_service_account}" >&2
            missing_bootstrap=1
          fi
          if [[ "${missing_bootstrap}" == "1" ]]; then
            echo "Preview IAM bootstrap is incomplete. Run the protected 'Preview Terraform IAM sync' workflow first." >&2
            exit 1
          fi

          gcloud projects get-iam-policy "${GOOGLE_CLOUD_PROJECT}" --format=json > "${RUNNER_TEMP}/preview-project-iam.json"
          gcloud iam service-accounts get-iam-policy "${preview_loader_service_account}" \
            --project="${GOOGLE_CLOUD_PROJECT}" \
            --format=json > "${RUNNER_TEMP}/preview-loader-iam.json"
          export PREVIEW_LOADER_WIF_MEMBER="${preview_loader_wif_member}"

          python - "${RUNNER_TEMP}/preview-project-iam.json" "${RUNNER_TEMP}/preview-loader-iam.json" <<'PY'
          import json
          import os
          import sys

          project_policy = json.load(open(sys.argv[1]))
          loader_policy = json.load(open(sys.argv[2]))
          project = os.environ["GOOGLE_CLOUD_PROJECT"]
          terraform_service_account = os.environ["TERRAFORM_SERVICE_ACCOUNT"]
          preview_database = f"projects/{project}/databases/feature-metadata-preview"
          preview_service_member = f"serviceAccount:metadata-service-preview@{project}.iam.gserviceaccount.com"
          preview_loader_member = f"serviceAccount:metadata-index-loader-preview@{project}.iam.gserviceaccount.com"
          preview_terraform_role = f"projects/{project}/roles/sharedDatasetsPreviewTerraform"
          loader_wif_member = os.environ["PREVIEW_LOADER_WIF_MEMBER"]

          def project_binding_exists(role, member, condition_title=None):
              for binding in project_policy.get("bindings", []):
                  if binding.get("role") != role or member not in binding.get("members", []):
                      continue
                  if condition_title is None:
                      return True
                  condition = binding.get("condition") or {}
                  if condition.get("title") != condition_title:
                      continue
                  if preview_database in condition.get("expression", ""):
                      return True
              return False

          def service_account_binding_exists(role, member):
              return any(
                  binding.get("role") == role and member in binding.get("members", [])
                  for binding in loader_policy.get("bindings", [])
              )

          missing = []
          if not project_binding_exists(preview_terraform_role, f"serviceAccount:{terraform_service_account}"):
              missing.append("preview Terraform custom role binding")
          if not project_binding_exists("roles/datastore.viewer", preview_service_member, "preview_firestore_read"):
              missing.append("preview service Firestore read binding")
          if not project_binding_exists("roles/datastore.user", preview_loader_member, "preview_firestore_write"):
              missing.append("preview loader Firestore write binding")
          if not service_account_binding_exists("roles/iam.workloadIdentityUser", loader_wif_member):
              missing.append("preview loader Workload Identity binding")

          if missing:
              print("Preview IAM bootstrap is incomplete. Run the protected 'Preview Terraform IAM sync' workflow first.")
              for item in missing:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Verify selected feature branch contains preview service
        run: |
          set -euo pipefail

          test -f preview-source/services/metadata_service/Dockerfile
          if ! grep -q "FEATURE_METADATA_FIRESTORE_DATABASE" preview-source/services/metadata_service/run.py; then
            echo "The selected feature branch must support the preview Firestore database override before it can run in preview." >&2
            exit 1
          fi

      - name: Build preview service image
        run: |
          set -euo pipefail

          safe_ref="$(printf '%s' "${PREVIEW_REF}" | tr -c 'A-Za-z0-9_.-' '-' | cut -c 1-80)"
          safe_ref="${safe_ref#-}"
          safe_ref="${safe_ref%-}"
          if [[ -z "${safe_ref}" ]]; then
            safe_ref="ref"
          fi

          image_tag="${REGION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:preview-${safe_ref}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker build \
            --platform linux/amd64 \
            -f preview-source/services/metadata_service/Dockerfile \
            -t "${image_tag}" \
            preview-source
          docker push "${image_tag}"
          image_digest="$(gcloud artifacts docker images describe "${image_tag}" --format='value(image_summary.fully_qualified_digest)')"
          if [[ -z "${image_digest}" || "${image_digest}" != *@sha256:* ]]; then
            echo "Could not resolve immutable image digest for ${image_tag}" >&2
            exit 1
          fi
          echo "PREVIEW_SERVICE_IMAGE=${image_digest}" >> "${GITHUB_ENV}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/preview init -input=false

      - name: Release stable preview bootstrap state
        run: |
          set -euo pipefail

          bootstrap_addresses=(
            "module.metadata_service_account.google_service_account.this"
            "module.metadata_index_loader_service_account.google_service_account.this"
            "google_service_account_iam_member.metadata_index_loader_github_wif"
          )

          for address in "${bootstrap_addresses[@]}"; do
            if terraform -chdir=terraform/envs/preview state list | grep -qx "${address}"; then
              terraform -chdir=terraform/envs/preview state rm "${address}"
            fi
          done

      - name: Terraform reset plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -destroy \
            -input=false \
            -out="${RUNNER_TEMP}/feature-branch-preview-reset.tfplan"

      - name: Export Terraform reset plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan" > "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan.json"

      - name: Enforce preview reset resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan.json" <<'PY'
          import json
          import re
          import sys

          plan = json.load(open(sys.argv[1]))
          legacy_preview_project_iam_exact = {
              "google_project_iam_member.metadata_service_firestore_viewer": {
                  "role": "roles/datastore.viewer",
                  "member": "serviceAccount:metadata-service-preview@shared-datasets-1.iam.gserviceaccount.com",
              },
              "google_project_iam_member.metadata_index_loader_firestore_user": {
                  "role": "roles/datastore.user",
                  "member": "serviceAccount:metadata-index-loader-preview@shared-datasets-1.iam.gserviceaccount.com",
              },
          }
          allowed_exact = {
              "google_storage_bucket.preview_bucket",
              "google_firestore_database.feature_metadata_preview",
              "google_storage_bucket_iam_member.metadata_service_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_index_load_creator",
              "google_cloud_run_v2_service.metadata_service_preview",
              "google_cloud_run_v2_service_iam_member.metadata_service_preview_iap_invoker",
          } | set(legacy_preview_project_iam_exact)
          allowed_patterns = [
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.metadata_service_preview_accessors\["),
          ]
          expected_database = "projects/shared-datasets-1/databases/feature-metadata-preview"

          def planned_values(resource):
              change = resource.get("change", {})
              for key in ("after", "before"):
                  value = change.get(key)
                  if isinstance(value, dict):
                      return value
              return {}

          def validate_legacy_project_iam(address, values):
              expected = legacy_preview_project_iam_exact[address]
              violations = []
              for key, expected_value in {
                  "project": "shared-datasets-1",
                  "role": expected["role"],
                  "member": expected["member"],
              }.items():
                  actual = values.get(key)
                  if actual != expected_value:
                      violations.append(f"{address} {key} is {actual!r}, expected {expected_value!r}")

              condition = values.get("condition") or []
              if not condition or not isinstance(condition, list):
                  violations.append(f"{address} must have a preview Firestore IAM condition")
              else:
                  expression = condition[0].get("expression", "")
                  if expected_database not in expression:
                      violations.append(f"{address} condition must be scoped to {expected_database!r}")
              return violations

          blocked = []
          value_violations = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if actions != ["delete"]:
                  blocked.append(f"{'/'.join(actions)} {address}")
              elif address not in allowed_exact and not any(pattern.match(address) for pattern in allowed_patterns):
                  blocked.append(f"{'/'.join(actions)} {address}")
              elif address in legacy_preview_project_iam_exact:
                  value_violations.extend(validate_legacy_project_iam(address, planned_values(resource)))

          if blocked:
              print("Refusing preview reset because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          if value_violations:
              print("Refusing preview reset because a legacy project IAM delete is not scoped to preview:")
              for item in value_violations:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply reset plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan"

      - name: Wait for preview database ID reuse
        run: |
          set -euo pipefail

          wait_required="$(
            python - "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          for resource in plan.get("resource_changes", []):
              if resource.get("address") != "google_firestore_database.feature_metadata_preview":
                  continue
              if resource.get("change", {}).get("actions", []) == ["delete"]:
                  print("1")
                  break
          else:
              print("0")
          PY
          )"

          if [[ "${wait_required}" == "1" ]]; then
            echo "The preview database was deleted during reset; waiting for database ID reuse."
            sleep 330
          else
            echo "The preview database was not deleted during reset; continuing without a reuse wait."
          fi

      - name: Terraform plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -input=false \
            -out="${RUNNER_TEMP}/feature-branch-preview.tfplan" \
            -var="preview_service_image=${PREVIEW_SERVICE_IMAGE}" \
            -var="preview_ref=${PREVIEW_REF}" \
            -var="preview_deploy_sha=${PREVIEW_DEPLOY_SHA}"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/feature-branch-preview.tfplan" > "${RUNNER_TEMP}/feature-branch-preview.tfplan.json"

      - name: Enforce preview resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/feature-branch-preview.tfplan.json" <<'PY'
          import json
          import re
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_storage_bucket.preview_bucket",
              "google_firestore_database.feature_metadata_preview",
              "google_storage_bucket_iam_member.metadata_service_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_object_viewer",
              "google_storage_bucket_iam_member.metadata_index_loader_preview_index_load_creator",
              "google_cloud_run_v2_service.metadata_service_preview",
              "google_cloud_run_v2_service_iam_member.metadata_service_preview_iap_invoker",
          }
          allowed_patterns = [
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.metadata_service_preview_accessors\["),
          ]
          expected = {
              "bucket": "skytruth-shared-datasets-1-preview",
              "service": "metadata-service-preview",
              "database": "feature-metadata-preview",
              "service_account": "metadata-service-preview",
              "index_loader_service_account": "metadata-index-loader-preview",
          }

          def planned_values(resource):
              change = resource.get("change", {})
              for key in ("after", "before"):
                  value = change.get(key)
                  if isinstance(value, dict):
                      return value
              return {}

          def require_value(violations, address, values, key, expected_value):
              actual = values.get(key)
              if actual is not None and actual != expected_value:
                  violations.append(f"{address} {key} is {actual!r}, expected {expected_value!r}")

          def cloud_run_env(values):
              template = values.get("template") or []
              if not template or not isinstance(template, list):
                  return {}
              containers = template[0].get("containers") or []
              if not containers or not isinstance(containers, list):
                  return {}
              env = containers[0].get("env") or []
              return {item.get("name"): item.get("value") for item in env if isinstance(item, dict)}

          blocked = []
          value_violations = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if address in allowed_exact or any(pattern.match(address) for pattern in allowed_patterns):
                  values = planned_values(resource)
                  if address == "google_storage_bucket.preview_bucket":
                      require_value(value_violations, address, values, "name", expected["bucket"])
                  elif address == "google_firestore_database.feature_metadata_preview":
                      require_value(value_violations, address, values, "name", expected["database"])
                  elif address == "google_cloud_run_v2_service.metadata_service_preview":
                      require_value(value_violations, address, values, "name", expected["service"])
                      env = cloud_run_env(values)
                      if env:
                          if env.get("SHARED_DATASETS_BUCKET") != expected["bucket"]:
                              value_violations.append(f"{address} SHARED_DATASETS_BUCKET must be {expected['bucket']!r}")
                          if env.get("FEATURE_METADATA_FIRESTORE_DATABASE") != expected["database"]:
                              value_violations.append(
                                  f"{address} preview Firestore database must be {expected['database']!r}"
                              )
                  elif address == "google_cloud_run_v2_service_iam_member.metadata_service_preview_iap_invoker":
                      require_value(value_violations, address, values, "name", expected["service"])
                  elif address.startswith("google_iap_web_cloud_run_service_iam_member.metadata_service_preview_accessors"):
                      require_value(value_violations, address, values, "cloud_run_service_name", expected["service"])
                  elif address.startswith("google_storage_bucket_iam_member."):
                      require_value(value_violations, address, values, "bucket", expected["bucket"])
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing preview deploy because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          if value_violations:
              print("Refusing preview deploy because an allowlisted resource is not constrained to preview names:")
              for item in value_violations:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply preview plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/feature-branch-preview.tfplan"

      - name: Report preview outputs
        run: |
          terraform -chdir=terraform/envs/preview output preview_service_uri
          terraform -chdir=terraform/envs/preview output preview_bucket
          terraform -chdir=terraform/envs/preview output preview_firestore_database
