name: Catalog drift guard

on:
  pull_request:
    branches:
      - main
  workflow_run:
    workflows:
      - Catalog web deploy
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"

jobs:
  catalog-drift:
    if: >-
      ${{
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate trusted live-drift ref
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Live catalog drift checks may only use production read-only auth from main." >&2
            exit 1
          fi

      - name: Check out pull request repository
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - name: Check out trusted repository
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check pull request catalog consistency
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          uv run python scripts/catalog_docs.py check
          uv run python scripts/catalog_site.py --out "${RUNNER_TEMP}/catalog-web"

      - name: Validate read-only GCP auth configuration
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_READONLY_SERVICE_ACCOUNT: ${{ vars.GCP_READONLY_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${GCP_READONLY_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_READONLY_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name != 'pull_request' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_READONLY_SERVICE_ACCOUNT }}

      - name: Collect release indexes for drift guard
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/release-indexes"
          if gcloud storage ls "gs://${SHARED_DATASETS_BUCKET}/_catalog/releases/*.json" >/dev/null 2>&1; then
            gcloud storage cp "gs://${SHARED_DATASETS_BUCKET}/_catalog/releases/*.json" "${RUNNER_TEMP}/release-indexes/"
          else
            echo "No release indexes found; checking catalog without release history."
          fi

      - name: Check live catalog drift
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          uv run python scripts/catalog_drift_guard.py \
            --release-index-dir "${RUNNER_TEMP}/release-indexes" \
            --latest-from-release-index
