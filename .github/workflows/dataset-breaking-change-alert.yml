name: Dataset breaking change alert

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: read

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"

jobs:
  alert:
    if: >-
      ${{
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.base.repo.full_name == github.repository &&
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install schema inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin

      - name: Detect reviewed mutation plans
        id: detect
        run: |
          python scripts/reviewed_dataset_plan.py detect \
            --event-path "${GITHUB_EVENT_PATH}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Extract publish plan from PR body
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract publish \
            --event-path "${GITHUB_EVENT_PATH}" \
            --output publish-plan.json

      - name: Extract delete plan from PR body
        if: ${{ steps.detect.outputs.has_delete_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract delete \
            --event-path "${GITHUB_EVENT_PATH}" \
            --output delete-plan.json

      - name: Collect proposed catalog row from PR
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' || steps.detect.outputs.has_delete_plan == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import urllib.parse

          def plan_asset_slug():
              for path in ("publish-plan.json", "delete-plan.json"):
                  plan_path = pathlib.Path(path)
                  if plan_path.exists():
                      return json.loads(plan_path.read_text())["asset_slug"]
              return ""

          def row_from_catalog_text(text, asset_slug):
              for row in csv.DictReader(text.splitlines()):
                  if row.get("asset_slug") == asset_slug:
                      return row
              return None

          asset_slug = plan_asset_slug()
          if not asset_slug:
              raise SystemExit(0)
          ref = urllib.parse.quote(os.environ["HEAD_SHA"], safe="")
          try:
              payload = json.loads(
                  subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"repos/{os.environ['GITHUB_REPOSITORY']}/contents/catalog/shared-datasets-catalog.csv?ref={ref}",
                      ],
                      text=True,
                  )
              )
          except subprocess.CalledProcessError as exc:
              print(f"Could not read proposed catalog at {os.environ['HEAD_SHA']}: {exc}")
              raise SystemExit(0)
          content = base64.b64decode(str(payload.get("content") or "")).decode("utf-8")
          row = row_from_catalog_text(content, asset_slug)
          if row:
              pathlib.Path("proposed-catalog-row.json").write_text(json.dumps(row, indent=2, sort_keys=True) + "\n")
          else:
              print(f"No proposed catalog row found for {asset_slug}; skipping catalog contract comparison.")
          PY

      - name: Detect planned schema compatibility targets
        id: schema_targets
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import csv
          import json
          import os
          import pathlib

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          targets = [
              promotion["destination_uri"]
              for promotion in plan["promotions"]
              if promotion.get("destination_generation")
              and is_schema_target(asset_slug, promotion["destination_uri"])
          ]
          print(f"has_schema_targets={str(bool(targets)).lower()}")
          print(f"schema_target_count={len(targets)}")
          PY

      - name: Validate read-only GCP auth configuration
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' && steps.schema_targets.outputs.has_schema_targets == 'true' }}
        env:
          GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_READONLY_SERVICE_ACCOUNT: ${{ vars.GCP_READONLY_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${GCP_READONLY_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_READONLY_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate read-only to Google Cloud
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' && steps.schema_targets.outputs.has_schema_targets == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_READONLY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_READONLY_SERVICE_ACCOUNT }}

      - name: Collect planned schema compatibility results
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' && steps.schema_targets.outputs.has_schema_targets == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p schema-results
          python - <<'PY'
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import tempfile

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          for index, promotion in enumerate(plan["promotions"], start=1):
              destination_uri = promotion["destination_uri"]
              if not promotion.get("destination_generation"):
                  print(f"Skipping planned schema alert for new destination {index}: {destination_uri}")
                  continue
              if not is_schema_target(asset_slug, destination_uri):
                  print(f"Skipping planned schema alert for promotion {index}: {destination_uri}")
                  continue
              filename = destination_uri.rsplit("/", 1)[-1]
              with tempfile.TemporaryDirectory() as tmp:
                  tmp_path = pathlib.Path(tmp)
                  dataset_path = tmp_path / filename
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/gcs_asset.py",
                          "download",
                          promotion["source_uri"],
                          str(dataset_path),
                          "--generation",
                          promotion["source_generation"],
                      ],
                      check=True,
                  )
                  args = [
                      "uv",
                      "run",
                      "python",
                      "scripts/dataset_alerts.py",
                      "check-schema-compatibility",
                      "--asset-slug",
                      asset_slug,
                      "--dataset-path",
                      str(dataset_path),
                  ]
                  waiver = promotion.get("compatibility_waiver")
                  if waiver:
                      waiver_path = tmp_path / "compatibility-waiver.json"
                      waiver_path.write_text(json.dumps(waiver, indent=2, sort_keys=True) + "\n")
                      args.extend(["--compatibility-waiver", str(waiver_path)])
                  completed = subprocess.run(args, check=True, capture_output=True, text=True)
                  output = completed.stdout.strip()
                  if output:
                      pathlib.Path("schema-results", f"promotion-{index}.json").write_text(output + "\n")
          PY

      - name: Summarize planned publish breaking alert
        if: ${{ steps.detect.outputs.has_publish_plan == 'true' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import subprocess
          import os

          args = [
              "uv",
              "run",
              "python",
              "scripts/dataset_alerts.py",
              "breaking-alert",
              "--phase",
              "planned",
              "--plan-type",
              "publish",
              "--plan-json",
              "publish-plan.json",
              "--pr-number",
              os.environ["PR_NUMBER"],
              "--pr-url",
              os.environ["PR_URL"],
              "--summary-json",
              "publish-breaking-alert.json",
              "--dry-run",
          ]
          if pathlib.Path("proposed-catalog-row.json").exists():
              args.extend(["--proposed-catalog-row-json", "proposed-catalog-row.json"])
          for path in sorted(pathlib.Path("schema-results").glob("*.json")):
              args.extend(["--schema-result", str(path)])
          subprocess.run(args, check=True)
          PY

      - name: Summarize planned delete breaking alert
        if: ${{ steps.detect.outputs.has_delete_plan == 'true' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          args=(
            uv run python scripts/dataset_alerts.py breaking-alert
            --phase planned
            --plan-type delete
            --plan-json delete-plan.json
            --pr-number "${PR_NUMBER}"
            --pr-url "${PR_URL}"
            --summary-json delete-breaking-alert.json
            --dry-run
          )
          if [[ -f proposed-catalog-row.json ]]; then
            args+=(--proposed-catalog-row-json proposed-catalog-row.json)
          fi
          "${args[@]}"

      - name: Send planned breaking alerts
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          marker_prefix = "shared-datasets-breaking-alert"

          def post_if_needed(summary_path, plan_path):
              path = pathlib.Path(summary_path)
              if not path.exists():
                  return
              summary = json.loads(path.read_text())
              if not summary.get("has_breaking_changes"):
                  print(f"No breaking changes in {summary_path}; skipping Slack.")
                  return
              marker = summary["marker"]
              if not marker.startswith(marker_prefix):
                  raise ValueError(f"unexpected breaking alert marker: {marker}")
              comments = json.loads(
                  subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments?per_page=100",
                      ],
                      text=True,
                  )
              )
              if any(marker in str(comment.get("body") or "") for comment in comments):
                  print(f"Breaking alert already sent for marker {marker}; skipping Slack.")
                  return
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/dataset_alerts.py",
                  "breaking-alert",
                  "--phase",
                  summary["phase"],
                  "--plan-type",
                  summary["plan_type"],
                  "--plan-json",
                  plan_path,
                  "--pr-number",
                  os.environ["PR_NUMBER"],
                  "--pr-url",
                  os.environ["PR_URL"],
              ]
              if summary["plan_type"] == "publish":
                  for result_path in sorted(pathlib.Path("schema-results").glob("*.json")):
                      args.extend(["--schema-result", str(result_path)])
              if pathlib.Path("proposed-catalog-row.json").exists():
                  args.extend(["--proposed-catalog-row-json", "proposed-catalog-row.json"])
              subprocess.run(args, check=True)
              body = (
                  f"<!-- {marker} -->\n"
                  f"Breaking change Slack alert sent for `{summary['asset_slug']}` "
                  f"({summary['phase']}/{summary['plan_type']})."
              )
              subprocess.run(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments",
                      "-f",
                      f"body={body}",
                  ],
                  check=True,
              )

          post_if_needed("publish-breaking-alert.json", "publish-plan.json")
          post_if_needed("delete-breaking-alert.json", "delete-plan.json")
          PY
