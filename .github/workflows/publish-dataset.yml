name: Approved dataset mutation

on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Same-repo PR number containing a publish/delete plan. Restricted to jonaraphael."
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: read

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  PUBLISHER_SERVICE_ACCOUNT: shared-datasets-publisher@shared-datasets-1.iam.gserviceaccount.com
  SHARED_DATASETS_ALLOW_CANONICAL_MUTATION: "1"
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"

jobs:
  reviewed_pr_plans:
    name: Detect reviewed PR mutation plans
    runs-on: ubuntu-latest
    if: >-
      ${{
        (
          (
            github.event_name == 'pull_request' &&
            github.event.action == 'closed' &&
            github.event.pull_request.merged == true &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.base.repo.full_name == github.repository &&
            github.event.pull_request.base.ref == github.event.repository.default_branch
          ) ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.actor == 'jonaraphael' &&
            github.event.inputs.pr_number != ''
          )
        )
      }}
    outputs:
      has_publish_plan: ${{ steps.detect.outputs.has_publish_plan }}
      has_delete_plan: ${{ steps.detect.outputs.has_delete_plan }}

    steps:
      - name: Validate main ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Approved dataset mutation dispatch must run from main; pass the reviewed PR number as input." >&2
            exit 1
          fi

      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare PR event payload
        id: pr_event
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "pr_number must be numeric" >&2
              exit 1
            fi

            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json
            python scripts/reviewed_dataset_plan.py event-from-pr \
              --pr-json pr.json \
              --repository "${GITHUB_REPOSITORY}" \
              --default-branch "${DEFAULT_BRANCH}" \
              --allow-merged \
              --output reviewed-pr-event.json
            echo "event_path=reviewed-pr-event.json" >> "${GITHUB_OUTPUT}"
          else
            echo "event_path=${GITHUB_EVENT_PATH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Detect reviewed mutation plans
        id: detect
        run: |
          python scripts/reviewed_dataset_plan.py detect \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Validate merged PR acceptance
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            (
              steps.detect.outputs.has_publish_plan == 'true' ||
              steps.detect.outputs.has_delete_plan == 'true'
            )
          }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "${PR_AUTHOR}" == "jonaraphael" ]]; then
            echo "Merged self-authored PR by jonaraphael; using restricted self-acceptance path."
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" > reviews.json
          python - <<'PY'
          import json
          import sys

          reviews = json.load(open("reviews.json"))
          approved = [
              review
              for review in reviews
              if review.get("state") == "APPROVED"
              and review.get("user", {}).get("login") == "jonaraphael"
          ]
          if not approved:
              print("Merged PR does not have an APPROVED review from jonaraphael", file=sys.stderr)
              raise SystemExit(1)
          PY

  apply-approved-pr-plans:
    name: Apply approved PR mutation plans
    needs: reviewed_pr_plans
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    if: >-
      ${{
        needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' ||
        needs.reviewed_pr_plans.outputs.has_delete_plan == 'true'
      }}
    concurrency:
      group: approved-dataset-mutation-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Approved dataset mutation dispatch must run from main; pass the reviewed PR number as input." >&2
            exit 1
          fi

      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate publisher auth configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi

      - name: Prepare PR event payload
        id: pr_event
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "pr_number must be numeric" >&2
              exit 1
            fi

            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json
            python scripts/reviewed_dataset_plan.py event-from-pr \
              --pr-json pr.json \
              --repository "${GITHUB_REPOSITORY}" \
              --default-branch "${DEFAULT_BRANCH}" \
              --allow-merged \
              --output reviewed-pr-event.json
            echo "event_path=reviewed-pr-event.json" >> "${GITHUB_OUTPUT}"
          else
            echo "event_path=${GITHUB_EVENT_PATH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Extract publish plan from PR body
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract publish \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --output publish-plan.json

      - name: Extract delete plan from PR body
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract delete \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --output delete-plan.json

      - name: Collect reviewed catalog rows
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' || needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PATH: ${{ steps.pr_event.outputs.event_path }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import urllib.parse

          def plan_asset_slug():
              for path in ("publish-plan.json", "delete-plan.json"):
                  plan_path = pathlib.Path(path)
                  if plan_path.exists():
                      return json.loads(plan_path.read_text())["asset_slug"]
              return ""

          def row_from_catalog_text(text, asset_slug):
              for row in csv.DictReader(text.splitlines()):
                  if row.get("asset_slug") == asset_slug:
                      return row
              return None

          def remote_catalog_text(ref):
              if not ref:
                  return None
              quoted_ref = urllib.parse.quote(ref, safe="")
              try:
                  payload = json.loads(
                      subprocess.check_output(
                          [
                              "gh",
                              "api",
                              f"repos/{os.environ['GITHUB_REPOSITORY']}/contents/catalog/shared-datasets-catalog.csv?ref={quoted_ref}",
                          ],
                          text=True,
                      )
                  )
              except subprocess.CalledProcessError as exc:
                  print(f"Could not read catalog at {ref}: {exc}")
                  return None
              return base64.b64decode(str(payload.get("content") or "")).decode("utf-8")

          def first_parent(ref):
              if not ref:
                  return ""
              quoted_ref = urllib.parse.quote(ref, safe="")
              try:
                  payload = json.loads(
                      subprocess.check_output(
                          ["gh", "api", f"repos/{os.environ['GITHUB_REPOSITORY']}/commits/{quoted_ref}"],
                          text=True,
                      )
                  )
              except subprocess.CalledProcessError as exc:
                  print(f"Could not inspect merge commit {ref}: {exc}")
                  return ""
              parents = payload.get("parents") or []
              return str(parents[0].get("sha") or "") if parents else ""

          asset_slug = plan_asset_slug()
          if not asset_slug:
              raise SystemExit(0)
          event = json.loads(pathlib.Path(os.environ["EVENT_PATH"]).read_text())
          pull_request = event.get("pull_request") or {}
          proposed_ref = str(pull_request.get("merge_commit_sha") or pull_request.get("head", {}).get("sha") or "")
          current_ref = first_parent(proposed_ref) or str(pull_request.get("base", {}).get("sha") or "")

          current_text = remote_catalog_text(current_ref)
          proposed_text = remote_catalog_text(proposed_ref)
          if proposed_text is None and pathlib.Path("catalog/shared-datasets-catalog.csv").exists():
              proposed_text = pathlib.Path("catalog/shared-datasets-catalog.csv").read_text()

          if current_text:
              row = row_from_catalog_text(current_text, asset_slug)
              if row:
                  pathlib.Path("current-catalog-row.json").write_text(json.dumps(row, indent=2, sort_keys=True) + "\n")
          if proposed_text:
              row = row_from_catalog_text(proposed_text, asset_slug)
              if row:
                  pathlib.Path("proposed-catalog-row.json").write_text(json.dumps(row, indent=2, sort_keys=True) + "\n")
          if not pathlib.Path("current-catalog-row.json").exists():
              print(f"No baseline catalog row found for {asset_slug}; skipping catalog contract comparison.")
          if not pathlib.Path("proposed-catalog-row.json").exists():
              print(f"No proposed catalog row found for {asset_slug}; skipping catalog contract comparison.")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install schema inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin

      - name: Validate publish destination layouts
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess

          plan = json.load(open("publish-plan.json"))
          for promotion in plan["promotions"]:
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "validate-path", promotion["destination_uri"]],
                  check=True,
              )
          PY

      - name: Validate delete target layouts
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess

          plan = json.load(open("delete-plan.json"))
          for deletion in plan["deletions"]:
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "validate-path", deletion["uri"]],
                  check=True,
              )
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.PUBLISHER_SERVICE_ACCOUNT }}

      - name: Check approved schema compatibility
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p schema-results
          python - <<'PY'
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import tempfile

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          for index, promotion in enumerate(plan["promotions"], start=1):
              destination_uri = promotion["destination_uri"]
              if not promotion.get("destination_generation"):
                  print(f"Skipping schema compatibility check for new destination {index}: {destination_uri}")
                  continue
              if not is_schema_target(asset_slug, destination_uri):
                  print(f"Skipping schema compatibility check for promotion {index}: {destination_uri}")
                  continue
              filename = destination_uri.rsplit("/", 1)[-1]
              with tempfile.TemporaryDirectory() as tmp:
                  tmp_path = pathlib.Path(tmp)
                  dataset_path = tmp_path / filename
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/gcs_asset.py",
                          "download",
                          promotion["source_uri"],
                          str(dataset_path),
                          "--generation",
                          promotion["source_generation"],
                      ],
                      check=True,
                  )
                  args = [
                      "uv",
                      "run",
                      "python",
                      "scripts/dataset_alerts.py",
                      "check-schema-compatibility",
                      "--asset-slug",
                      asset_slug,
                      "--dataset-path",
                      str(dataset_path),
                  ]
                  waiver = promotion.get("compatibility_waiver")
                  if waiver:
                      waiver_path = tmp_path / "compatibility-waiver.json"
                      waiver_path.write_text(json.dumps(waiver, indent=2, sort_keys=True) + "\n")
                      args.extend(["--compatibility-waiver", str(waiver_path)])
                  completed = subprocess.run(args, check=True, capture_output=True, text=True)
                  output = completed.stdout.strip()
                  if output:
                      print(output)
                      pathlib.Path("schema-results", f"promotion-{index}.json").write_text(output + "\n")
          PY

      - name: Promote approved staged objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import copy
          import csv
          import json
          import os
          import pathlib
          import shlex
          import subprocess
          import tempfile

          from google.api_core.exceptions import NotFound

          from scripts import gcs_asset

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]
          catalog_web_catalog_uri = f"gs://{bucket}/_catalog/web/catalog.json"
          ignored_generated_at = "<ignored-generated-at>"

          def normalize_catalog_json(text, *, label):
              payload = json.loads(text)
              if not isinstance(payload, dict):
                  raise ValueError(f"{label} must be a JSON object")
              generated_at = payload.get("generated_at")
              if not isinstance(generated_at, str) or not generated_at.strip():
                  raise ValueError(f"{label} generated_at must be a non-empty string")
              normalized = copy.deepcopy(payload)
              normalized["generated_at"] = ignored_generated_at
              return normalized

          def catalog_json_destination_already_current(promotion):
              if promotion["destination_uri"] != catalog_web_catalog_uri:
                  return False

              client = gcs_asset.get_client()
              destination_blob = gcs_asset.get_blob(promotion["destination_uri"])
              try:
                  destination_blob.reload()
              except NotFound:
                  return False

              if promotion["content_type"] and destination_blob.content_type != promotion["content_type"]:
                  return False
              if promotion["cache_control"] and destination_blob.cache_control != promotion["cache_control"]:
                  return False

              source_bucket, source_name = gcs_asset.parse_gs_uri(promotion["source_uri"])
              destination_bucket, destination_name = gcs_asset.parse_gs_uri(promotion["destination_uri"])
              source_blob = client.bucket(source_bucket).blob(
                  source_name,
                  generation=int(promotion["source_generation"]),
              )
              current_destination_blob = client.bucket(destination_bucket).blob(
                  destination_name,
                  generation=int(destination_blob.generation),
              )

              try:
                  source_payload = normalize_catalog_json(
                      source_blob.download_as_text(),
                      label=promotion["source_uri"],
                  )
                  destination_payload = normalize_catalog_json(
                      current_destination_blob.download_as_text(),
                      label=promotion["destination_uri"],
                  )
              except (json.JSONDecodeError, ValueError):
                  return False

              if source_payload != destination_payload:
                  return False

              print(
                  "Skipping catalog.json promotion because the destination already matches "
                  "the staged source after ignoring generated_at, with matching content "
                  "type and cache-control metadata."
              )
              return True

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          for index, promotion in enumerate(plan["promotions"], start=1):
              print(f"Promoting object {index} of {len(plan['promotions'])}: {promotion['destination_uri']}")
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "stat", promotion["source_uri"]],
                  check=True,
              )
              if catalog_json_destination_already_current(promotion):
                  continue
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "copy",
                  promotion["source_uri"],
                  promotion["destination_uri"],
                  "--source-generation",
                  promotion["source_generation"],
              ]
              if promotion["destination_generation"]:
                  args.extend(["--replace-generation", promotion["destination_generation"]])
              if promotion["content_type"]:
                  args.extend(["--content-type", promotion["content_type"]])
              if promotion["cache_control"]:
                  args.extend(["--cache-control", promotion["cache_control"]])
              print("running:", " ".join(shlex.quote(part) for part in args))
              subprocess.run(args, check=True)
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "stat", promotion["destination_uri"]],
                  check=True,
              )
              if not is_schema_target(asset_slug, promotion["destination_uri"]):
                  print(f"Skipping schema snapshot update for promotion {index}: {promotion['destination_uri']}")
                  continue
              filename = promotion["destination_uri"].rsplit("/", 1)[-1]
              with tempfile.TemporaryDirectory() as tmp:
                  dataset_path = pathlib.Path(tmp) / filename
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/gcs_asset.py",
                          "download",
                          promotion["source_uri"],
                          str(dataset_path),
                          "--generation",
                          promotion["source_generation"],
                      ],
                      check=True,
                  )
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/dataset_alerts.py",
                          "check-schema",
                          "--asset-slug",
                          asset_slug,
                          "--dataset-path",
                          str(dataset_path),
                          "--upload-snapshot",
                      ],
                      check=True,
                  )
          PY

      - name: Finalize promoted release metadata
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          uv run python scripts/finalize_promoted_release_metadata.py \
            --publish-plan publish-plan.json \
            --output finalized-release-metadata.json
          cat finalized-release-metadata.json

      - name: Rebuild promoted release index
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import subprocess

          plan = json.load(open("publish-plan.json"))
          requested_slugs = [plan["asset_slug"], *plan.get("release_index_asset_slugs", [])]
          asset_slugs = []
          seen = set()
          with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
              catalog_slugs = {row.get("asset_slug") for row in csv.DictReader(file_obj) if row.get("asset_slug")}
          for index, asset_slug in enumerate(requested_slugs):
              if not asset_slug or asset_slug in seen:
                  continue
              if asset_slug not in catalog_slugs:
                  if index == 0:
                      print(f"Skipping release-index rebuild because {asset_slug!r} is not a catalog asset.")
                      seen.add(asset_slug)
                      continue
                  raise RuntimeError(f"requested release-index rebuild asset is not in catalog: {asset_slug!r}")
              asset_slugs.append(asset_slug)
              seen.add(asset_slug)
          if not asset_slugs:
              print("No catalog asset release indexes requested for rebuild.")
              raise SystemExit(0)

          for asset_slug in asset_slugs:
              subprocess.run(
                  [
                      "uv",
                      "run",
                      "python",
                      "scripts/gcs_asset.py",
                      "release-index",
                      "rebuild",
                      "--asset-slug",
                      asset_slug,
                  ],
                  check=True,
              )
          PY

      - name: Send breaking change alert
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          marker_prefix = "shared-datasets-breaking-alert"
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          pr_number = os.environ.get("PR_NUMBER", "").strip()
          pr_url = os.environ.get("PR_URL", "").strip()
          if not pr_url and pr_number:
              pr_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/pull/{pr_number}"
          args = [
              "uv",
              "run",
              "python",
              "scripts/dataset_alerts.py",
              "breaking-alert",
              "--phase",
              "live",
              "--plan-type",
              "publish",
              "--plan-json",
              "publish-plan.json",
              "--run-url",
              run_url,
              "--summary-json",
              "publish-breaking-alert.json",
              "--dry-run",
          ]
          if pr_number:
              args.extend(["--pr-number", pr_number])
          if pr_url:
              args.extend(["--pr-url", pr_url])
          for row_path, option in (
              ("current-catalog-row.json", "--current-catalog-row-json"),
              ("proposed-catalog-row.json", "--proposed-catalog-row-json"),
          ):
              if pathlib.Path(row_path).exists():
                  args.extend([option, row_path])
          for path in sorted(pathlib.Path("schema-results").glob("*.json")):
              args.extend(["--schema-result", str(path)])
          subprocess.run(args, check=True)

          summary = json.loads(pathlib.Path("publish-breaking-alert.json").read_text())
          if not summary.get("has_breaking_changes"):
              raise SystemExit(0)
          marker = summary["marker"]
          if not marker.startswith(marker_prefix):
              raise ValueError(f"unexpected breaking alert marker: {marker}")
          if pr_number:
              comments = json.loads(
                  subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{pr_number}/comments?per_page=100",
                      ],
                      text=True,
                  )
              )
              if any(marker in str(comment.get("body") or "") for comment in comments):
                  print(f"Breaking alert already sent for marker {marker}; skipping Slack.")
                  raise SystemExit(0)
          send_args = [
              part for part in args
              if part not in {"--dry-run", "publish-breaking-alert.json"}
          ]
          summary_index = send_args.index("--summary-json")
          del send_args[summary_index:summary_index + 2]
          subprocess.run(send_args, check=True)
          if pr_number:
              body = (
                  f"<!-- {marker} -->\n"
                  f"Live breaking change Slack alert sent for `{summary['asset_slug']}` "
                  f"({summary['plan_type']})."
              )
              subprocess.run(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{pr_number}/comments",
                      "-f",
                      f"body={body}",
                  ],
                  check=True,
              )
          PY

      - name: Send dataset upload summary
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        env:
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import tempfile

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          def release_path_for(destinations):
              for uri in destinations:
                  prefix, marker, suffix = uri.partition("/releases/")
                  if not marker:
                      continue
                  release_date = suffix.split("/", 1)[0]
                  if release_date:
                      return f"{prefix}/releases/{release_date}/"
              return ""

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          row = catalog_row(asset_slug)
          if row is None:
              print(f"Skipping dataset upload summary because {asset_slug!r} is not a catalog asset.")
              raise SystemExit(0)

          destinations = [promotion["destination_uri"] for promotion in plan["promotions"]]
          canonical_path = row.get("canonical_path", "")
          canonical_promotion = next(
              (
                  promotion
                  for promotion in plan["promotions"]
                  if promotion["destination_uri"] == canonical_path
              ),
              None,
          )
          new_dataset = bool(
              canonical_promotion
              and not str(canonical_promotion.get("destination_generation", "")).strip()
          )
          args = [
              "uv",
              "run",
              "python",
              "scripts/dataset_alerts.py",
              "upload-summary",
              "--asset-slug",
              asset_slug,
          ]
          if new_dataset:
              args.append("--new-dataset")
          for destination in destinations:
              args.extend(["--changed-path", destination])
          release_path = release_path_for(destinations)
          if release_path:
              args.extend(["--release-path", release_path])

          schema_promotion = next(
              (
                  promotion
                  for promotion in plan["promotions"]
                  if is_schema_target(asset_slug, promotion["destination_uri"])
              ),
              None,
          )
          if schema_promotion is None:
              subprocess.run(args, check=True)
              raise SystemExit(0)

          filename = schema_promotion["destination_uri"].rsplit("/", 1)[-1]
          with tempfile.TemporaryDirectory() as tmp:
              dataset_path = pathlib.Path(tmp) / filename
              subprocess.run(
                  [
                      "uv",
                      "run",
                      "python",
                      "scripts/gcs_asset.py",
                      "download",
                      schema_promotion["source_uri"],
                      str(dataset_path),
                      "--generation",
                      schema_promotion["source_generation"],
                  ],
                  check=True,
              )
              subprocess.run(args + ["--dataset-path", str(dataset_path)], check=True)
          PY

      - name: Delete promoted scratch source objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shlex
          import subprocess
          import sys

          plan = json.load(open("publish-plan.json"))
          seen = set()
          promotions = []
          for promotion in plan["promotions"]:
              key = (promotion["source_uri"], promotion["source_generation"])
              if key in seen:
                  continue
              seen.add(key)
              promotions.append(promotion)

          for index, promotion in enumerate(promotions, start=1):
              print(f"Deleting promoted scratch source {index} of {len(promotions)}: {promotion['source_uri']}")
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "delete",
                  promotion["source_uri"],
                  "--generation",
                  promotion["source_generation"],
                  "--confirm",
                  "DELETE",
              ]
              print("running:", " ".join(shlex.quote(part) for part in args))
              subprocess.run(args, check=True)
              exists = subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "exists", promotion["source_uri"]],
                  check=False,
              )
              if exists.returncode == 0:
                  print(f"deleted scratch source still exists: {promotion['source_uri']}", file=sys.stderr)
                  sys.exit(1)
              if exists.returncode != 1:
                  print(f"could not verify scratch source absence: {promotion['source_uri']}", file=sys.stderr)
                  sys.exit(exists.returncode)
          PY

      - name: Delete approved canonical objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shlex
          import subprocess
          import sys

          plan = json.load(open("delete-plan.json"))
          for index, deletion in enumerate(plan["deletions"], start=1):
              print(f"Deleting object {index} of {len(plan['deletions'])}: {deletion['uri']}")
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "stat", deletion["uri"]],
                  check=True,
              )
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "delete",
                  deletion["uri"],
                  "--generation",
                  deletion["generation"],
                  "--confirm",
                  "DELETE",
              ]
              print("running:", " ".join(shlex.quote(part) for part in args))
              subprocess.run(args, check=True)
              exists = subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "exists", deletion["uri"]],
                  check=False,
              )
              if exists.returncode == 0:
                  print(f"deleted object still exists: {deletion['uri']}", file=sys.stderr)
                  sys.exit(1)
              if exists.returncode != 1:
                  print(f"could not verify deleted object absence: {deletion['uri']}", file=sys.stderr)
                  sys.exit(exists.returncode)
          PY

