name: Approved dataset mutation

on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Same-repo PR number containing a publish/delete plan. Restricted to jonaraphael."
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: read

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  PUBLISHER_SERVICE_ACCOUNT: shared-datasets-publisher@shared-datasets-1.iam.gserviceaccount.com
  SHARED_DATASETS_ALLOW_CANONICAL_MUTATION: "1"
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"

jobs:
  reviewed_pr_plans:
    name: Detect reviewed PR mutation plans
    runs-on: ubuntu-latest
    if: >-
      ${{
        (
          (
            github.event_name == 'pull_request' &&
            github.event.action == 'closed' &&
            github.event.pull_request.merged == true &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.base.repo.full_name == github.repository &&
            github.event.pull_request.base.ref == github.event.repository.default_branch
          ) ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.actor == 'jonaraphael' &&
            github.event.inputs.pr_number != ''
          )
        )
      }}
    outputs:
      has_publish_plan: ${{ steps.detect.outputs.has_publish_plan }}
      has_delete_plan: ${{ steps.detect.outputs.has_delete_plan }}

    steps:
      - name: Validate main ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Approved dataset mutation dispatch must run from main; pass the reviewed PR number as input." >&2
            exit 1
          fi

      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare PR event payload
        id: pr_event
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "pr_number must be numeric" >&2
              exit 1
            fi

            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json
            python scripts/reviewed_dataset_plan.py event-from-pr \
              --pr-json pr.json \
              --repository "${GITHUB_REPOSITORY}" \
              --default-branch "${DEFAULT_BRANCH}" \
              --allow-merged \
              --output reviewed-pr-event.json
            echo "event_path=reviewed-pr-event.json" >> "${GITHUB_OUTPUT}"
          else
            echo "event_path=${GITHUB_EVENT_PATH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Detect reviewed mutation plans
        id: detect
        run: |
          python scripts/reviewed_dataset_plan.py detect \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Validate merged PR acceptance
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            (
              steps.detect.outputs.has_publish_plan == 'true' ||
              steps.detect.outputs.has_delete_plan == 'true'
            )
          }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "${PR_AUTHOR}" == "jonaraphael" ]]; then
            echo "Merged self-authored PR by jonaraphael; using restricted self-acceptance path."
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" > reviews.json
          python scripts/publish_workflow.py check-approved-review --reviews-json reviews.json

  apply-approved-pr-plans:
    name: Apply approved PR mutation plans
    needs: reviewed_pr_plans
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    if: >-
      ${{
        needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' ||
        needs.reviewed_pr_plans.outputs.has_delete_plan == 'true'
      }}
    concurrency:
      group: approved-dataset-mutation-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Approved dataset mutation dispatch must run from main; pass the reviewed PR number as input." >&2
            exit 1
          fi

      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate publisher auth configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi

      - name: Prepare PR event payload
        id: pr_event
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "pr_number must be numeric" >&2
              exit 1
            fi

            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json
            python scripts/reviewed_dataset_plan.py event-from-pr \
              --pr-json pr.json \
              --repository "${GITHUB_REPOSITORY}" \
              --default-branch "${DEFAULT_BRANCH}" \
              --allow-merged \
              --output reviewed-pr-event.json
            echo "event_path=reviewed-pr-event.json" >> "${GITHUB_OUTPUT}"
          else
            echo "event_path=${GITHUB_EVENT_PATH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Extract publish plan from PR body
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract publish \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --output publish-plan.json

      - name: Extract delete plan from PR body
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract delete \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --output delete-plan.json

      - name: Collect reviewed catalog rows
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' || needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PATH: ${{ steps.pr_event.outputs.event_path }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py collect-catalog-rows --event-path "${EVENT_PATH}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install schema inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin

      - name: Validate publish destination layouts
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py validate-plan-paths --plan-type publish --plan-json publish-plan.json

      - name: Validate delete target layouts
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py validate-plan-paths --plan-type delete --plan-json delete-plan.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.PUBLISHER_SERVICE_ACCOUNT }}

      - name: Check approved schema compatibility
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py check-schema-compatibility --plan-json publish-plan.json --phase live

      - name: Promote approved staged objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          uv run python scripts/publish_workflow.py promote --plan-json publish-plan.json

      - name: Finalize promoted release metadata
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          uv run python scripts/finalize_promoted_release_metadata.py \
            --publish-plan publish-plan.json \
            --output finalized-release-metadata.json
          cat finalized-release-metadata.json

      - name: Rebuild promoted release index
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py rebuild-release-index --plan-json publish-plan.json

      - name: Send breaking change alert
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py live-breaking-alert \
            --plan-type publish \
            --plan-json publish-plan.json \
            --summary-json publish-breaking-alert.json

      - name: Send dataset upload summary
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        env:
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py upload-summary --plan-json publish-plan.json

      - name: Delete promoted scratch source objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py delete-scratch-sources --plan-json publish-plan.json

      - name: Delete approved canonical objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py delete-canonical-objects --plan-json delete-plan.json

      - name: Send deletion breaking change alert
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python scripts/publish_workflow.py live-breaking-alert \
            --plan-type delete \
            --plan-json delete-plan.json \
            --summary-json delete-breaking-alert.json
