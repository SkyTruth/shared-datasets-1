name: Approved dataset mutation

on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Same-repo PR number containing a publish/delete plan. Restricted to jonaraphael."
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: read

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1
  PUBLISHER_SERVICE_ACCOUNT: shared-datasets-publisher@shared-datasets-1.iam.gserviceaccount.com
  SHARED_DATASETS_ALLOW_CANONICAL_MUTATION: "1"
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"

jobs:
  reviewed_pr_plans:
    name: Detect reviewed PR mutation plans
    runs-on: ubuntu-latest
    if: >-
      ${{
        (
          (
            github.event_name == 'pull_request' &&
            github.event.action == 'closed' &&
            github.event.pull_request.merged == true &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.base.repo.full_name == github.repository &&
            github.event.pull_request.base.ref == github.event.repository.default_branch
          ) ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.actor == 'jonaraphael' &&
            github.event.inputs.pr_number != ''
          )
        )
      }}
    outputs:
      has_publish_plan: ${{ steps.detect.outputs.has_publish_plan }}
      has_delete_plan: ${{ steps.detect.outputs.has_delete_plan }}

    steps:
      - name: Validate main ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Approved dataset mutation dispatch must run from main; pass the reviewed PR number as input." >&2
            exit 1
          fi

      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare PR event payload
        id: pr_event
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "pr_number must be numeric" >&2
              exit 1
            fi

            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json
            python scripts/reviewed_dataset_plan.py event-from-pr \
              --pr-json pr.json \
              --repository "${GITHUB_REPOSITORY}" \
              --default-branch "${DEFAULT_BRANCH}" \
              --allow-merged \
              --output reviewed-pr-event.json
            echo "event_path=reviewed-pr-event.json" >> "${GITHUB_OUTPUT}"
          else
            echo "event_path=${GITHUB_EVENT_PATH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Detect reviewed mutation plans
        id: detect
        run: |
          python scripts/reviewed_dataset_plan.py detect \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Validate merged PR acceptance
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            (
              steps.detect.outputs.has_publish_plan == 'true' ||
              steps.detect.outputs.has_delete_plan == 'true'
            )
          }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "${PR_AUTHOR}" == "jonaraphael" ]]; then
            echo "Merged self-authored PR by jonaraphael; using restricted self-acceptance path."
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" > reviews.json
          python - <<'PY'
          import json
          import sys

          reviews = json.load(open("reviews.json"))
          approved = [
              review
              for review in reviews
              if review.get("state") == "APPROVED"
              and review.get("user", {}).get("login") == "jonaraphael"
          ]
          if not approved:
              print("Merged PR does not have an APPROVED review from jonaraphael", file=sys.stderr)
              raise SystemExit(1)
          PY

  apply-approved-pr-plans:
    name: Apply approved PR mutation plans
    needs: reviewed_pr_plans
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    if: >-
      ${{
        needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' ||
        needs.reviewed_pr_plans.outputs.has_delete_plan == 'true'
      }}
    concurrency:
      group: approved-dataset-mutation-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Approved dataset mutation dispatch must run from main; pass the reviewed PR number as input." >&2
            exit 1
          fi

      - name: Check out trusted repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate publisher auth configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          set -euo pipefail

          if [[ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi

      - name: Prepare PR event payload
        id: pr_event
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "pr_number must be numeric" >&2
              exit 1
            fi

            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json
            python scripts/reviewed_dataset_plan.py event-from-pr \
              --pr-json pr.json \
              --repository "${GITHUB_REPOSITORY}" \
              --default-branch "${DEFAULT_BRANCH}" \
              --allow-merged \
              --output reviewed-pr-event.json
            echo "event_path=reviewed-pr-event.json" >> "${GITHUB_OUTPUT}"
          else
            echo "event_path=${GITHUB_EVENT_PATH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Extract publish plan from PR body
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract publish \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --output publish-plan.json

      - name: Extract delete plan from PR body
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          python scripts/reviewed_dataset_plan.py extract delete \
            --event-path "${{ steps.pr_event.outputs.event_path }}" \
            --output delete-plan.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install schema inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin

      - name: Validate publish destination layouts
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess

          plan = json.load(open("publish-plan.json"))
          for promotion in plan["promotions"]:
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "validate-path", promotion["destination_uri"]],
                  check=True,
              )
          PY

      - name: Validate delete target layouts
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess

          plan = json.load(open("delete-plan.json"))
          for deletion in plan["deletions"]:
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "validate-path", deletion["uri"]],
                  check=True,
              )
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.PUBLISHER_SERVICE_ACCOUNT }}

      - name: Check approved schema compatibility
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import tempfile

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          for index, promotion in enumerate(plan["promotions"], start=1):
              destination_uri = promotion["destination_uri"]
              if not is_schema_target(asset_slug, destination_uri):
                  print(f"Skipping schema compatibility check for promotion {index}: {destination_uri}")
                  continue
              filename = destination_uri.rsplit("/", 1)[-1]
              with tempfile.TemporaryDirectory() as tmp:
                  tmp_path = pathlib.Path(tmp)
                  dataset_path = tmp_path / filename
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/gcs_asset.py",
                          "download",
                          promotion["source_uri"],
                          str(dataset_path),
                          "--generation",
                          promotion["source_generation"],
                      ],
                      check=True,
                  )
                  args = [
                      "uv",
                      "run",
                      "python",
                      "scripts/dataset_alerts.py",
                      "check-schema-compatibility",
                      "--asset-slug",
                      asset_slug,
                      "--dataset-path",
                      str(dataset_path),
                  ]
                  waiver = promotion.get("compatibility_waiver")
                  if waiver:
                      waiver_path = tmp_path / "compatibility-waiver.json"
                      waiver_path.write_text(json.dumps(waiver, indent=2, sort_keys=True) + "\n")
                      args.extend(["--compatibility-waiver", str(waiver_path)])
                  subprocess.run(args, check=True)
          PY

      - name: Promote approved staged objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import copy
          import csv
          import json
          import os
          import pathlib
          import shlex
          import subprocess
          import tempfile

          from google.api_core.exceptions import NotFound

          from scripts import gcs_asset

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]
          catalog_web_catalog_uri = f"gs://{bucket}/_catalog/web/catalog.json"
          ignored_generated_at = "<ignored-generated-at>"

          def normalize_catalog_json(text, *, label):
              payload = json.loads(text)
              if not isinstance(payload, dict):
                  raise ValueError(f"{label} must be a JSON object")
              generated_at = payload.get("generated_at")
              if not isinstance(generated_at, str) or not generated_at.strip():
                  raise ValueError(f"{label} generated_at must be a non-empty string")
              normalized = copy.deepcopy(payload)
              normalized["generated_at"] = ignored_generated_at
              return normalized

          def catalog_json_destination_already_current(promotion):
              if promotion["destination_uri"] != catalog_web_catalog_uri:
                  return False

              client = gcs_asset.get_client()
              destination_blob = gcs_asset.get_blob(promotion["destination_uri"])
              try:
                  destination_blob.reload()
              except NotFound:
                  return False

              if promotion["content_type"] and destination_blob.content_type != promotion["content_type"]:
                  return False
              if promotion["cache_control"] and destination_blob.cache_control != promotion["cache_control"]:
                  return False

              source_bucket, source_name = gcs_asset.parse_gs_uri(promotion["source_uri"])
              destination_bucket, destination_name = gcs_asset.parse_gs_uri(promotion["destination_uri"])
              source_blob = client.bucket(source_bucket).blob(
                  source_name,
                  generation=int(promotion["source_generation"]),
              )
              current_destination_blob = client.bucket(destination_bucket).blob(
                  destination_name,
                  generation=int(destination_blob.generation),
              )

              try:
                  source_payload = normalize_catalog_json(
                      source_blob.download_as_text(),
                      label=promotion["source_uri"],
                  )
                  destination_payload = normalize_catalog_json(
                      current_destination_blob.download_as_text(),
                      label=promotion["destination_uri"],
                  )
              except (json.JSONDecodeError, ValueError):
                  return False

              if source_payload != destination_payload:
                  return False

              print(
                  "Skipping catalog.json promotion because the destination already matches "
                  "the staged source after ignoring generated_at, with matching content "
                  "type and cache-control metadata."
              )
              return True

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          for index, promotion in enumerate(plan["promotions"], start=1):
              print(f"Promoting object {index} of {len(plan['promotions'])}: {promotion['destination_uri']}")
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "stat", promotion["source_uri"]],
                  check=True,
              )
              if catalog_json_destination_already_current(promotion):
                  continue
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "copy",
                  promotion["source_uri"],
                  promotion["destination_uri"],
                  "--source-generation",
                  promotion["source_generation"],
              ]
              if promotion["destination_generation"]:
                  args.extend(["--replace-generation", promotion["destination_generation"]])
              if promotion["content_type"]:
                  args.extend(["--content-type", promotion["content_type"]])
              if promotion["cache_control"]:
                  args.extend(["--cache-control", promotion["cache_control"]])
              print("running:", " ".join(shlex.quote(part) for part in args))
              subprocess.run(args, check=True)
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "stat", promotion["destination_uri"]],
                  check=True,
              )
              if not is_schema_target(asset_slug, promotion["destination_uri"]):
                  print(f"Skipping schema snapshot update for promotion {index}: {promotion['destination_uri']}")
                  continue
              filename = promotion["destination_uri"].rsplit("/", 1)[-1]
              with tempfile.TemporaryDirectory() as tmp:
                  dataset_path = pathlib.Path(tmp) / filename
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/gcs_asset.py",
                          "download",
                          promotion["source_uri"],
                          str(dataset_path),
                          "--generation",
                          promotion["source_generation"],
                      ],
                      check=True,
                  )
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "python",
                          "scripts/dataset_alerts.py",
                          "check-schema",
                          "--asset-slug",
                          asset_slug,
                          "--dataset-path",
                          str(dataset_path),
                      ],
                      check=True,
                  )
          PY

      - name: Finalize promoted release metadata
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          uv run python scripts/finalize_promoted_release_metadata.py \
            --publish-plan publish-plan.json \
            --output finalized-release-metadata.json
          cat finalized-release-metadata.json

      - name: Rebuild promoted release index
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import subprocess

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
              asset_exists = any(row.get("asset_slug") == asset_slug for row in csv.DictReader(file_obj))
          if not asset_exists:
              print(f"Skipping release-index rebuild because {asset_slug!r} is not a catalog asset.")
              raise SystemExit(0)

          subprocess.run(
              [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "release-index",
                  "rebuild",
                  "--asset-slug",
                  asset_slug,
              ],
              check=True,
          )
          PY

      - name: Send dataset upload summary
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        env:
          SHARED_DATASETS_SLACK_WEBHOOK_URL: ${{ secrets.SHARED_DATASETS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import os
          import pathlib
          import subprocess
          import tempfile

          schema_suffixes = {".fgb", ".geojson", ".ndgeojson", ".csv"}
          bucket = os.environ["SHARED_DATASETS_BUCKET"]

          def catalog_row(asset_slug):
              with open("catalog/shared-datasets-catalog.csv", newline="") as file_obj:
                  for row in csv.DictReader(file_obj):
                      if row.get("asset_slug") == asset_slug:
                          return row
              return None

          def is_schema_target(asset_slug, destination_uri):
              prefix = f"gs://{bucket}/"
              if not destination_uri.startswith(prefix):
                  return False
              destination_name = destination_uri.removeprefix(prefix)
              filename = destination_name.rsplit("/", 1)[-1]
              suffix = pathlib.Path(filename).suffix.lower()
              if suffix not in schema_suffixes or not ("/latest/" in destination_name or "/releases/" in destination_name):
                  return False
              row = catalog_row(asset_slug)
              if row:
                  canonical_path = row.get("canonical_path", "")
                  canonical_filename = canonical_path.rsplit("/", 1)[-1]
                  if destination_uri == canonical_path:
                      return True
                  if "/latest/" in canonical_path:
                      asset_root = canonical_path.split("/latest/", 1)[0]
                      if destination_uri.startswith(f"{asset_root}/releases/") and filename == canonical_filename:
                          return True
                  return False
              return pathlib.Path(filename).stem == asset_slug

          def release_path_for(destinations):
              for uri in destinations:
                  prefix, marker, suffix = uri.partition("/releases/")
                  if not marker:
                      continue
                  release_date = suffix.split("/", 1)[0]
                  if release_date:
                      return f"{prefix}/releases/{release_date}/"
              return ""

          plan = json.load(open("publish-plan.json"))
          asset_slug = plan["asset_slug"]
          destinations = [promotion["destination_uri"] for promotion in plan["promotions"]]
          args = [
              "uv",
              "run",
              "python",
              "scripts/dataset_alerts.py",
              "upload-summary",
              "--asset-slug",
              asset_slug,
          ]
          for destination in destinations:
              args.extend(["--changed-path", destination])
          release_path = release_path_for(destinations)
          if release_path:
              args.extend(["--release-path", release_path])

          schema_promotion = next(
              (
                  promotion
                  for promotion in plan["promotions"]
                  if is_schema_target(asset_slug, promotion["destination_uri"])
              ),
              None,
          )
          if schema_promotion is None:
              subprocess.run(args, check=True)
              raise SystemExit(0)

          filename = schema_promotion["destination_uri"].rsplit("/", 1)[-1]
          with tempfile.TemporaryDirectory() as tmp:
              dataset_path = pathlib.Path(tmp) / filename
              subprocess.run(
                  [
                      "uv",
                      "run",
                      "python",
                      "scripts/gcs_asset.py",
                      "download",
                      schema_promotion["source_uri"],
                      str(dataset_path),
                      "--generation",
                      schema_promotion["source_generation"],
                  ],
                  check=True,
              )
              subprocess.run(args + ["--dataset-path", str(dataset_path)], check=True)
          PY

      - name: Delete promoted scratch source objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_publish_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shlex
          import subprocess
          import sys

          plan = json.load(open("publish-plan.json"))
          seen = set()
          promotions = []
          for promotion in plan["promotions"]:
              key = (promotion["source_uri"], promotion["source_generation"])
              if key in seen:
                  continue
              seen.add(key)
              promotions.append(promotion)

          for index, promotion in enumerate(promotions, start=1):
              print(f"Deleting promoted scratch source {index} of {len(promotions)}: {promotion['source_uri']}")
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "delete",
                  promotion["source_uri"],
                  "--generation",
                  promotion["source_generation"],
                  "--confirm",
                  "DELETE",
              ]
              print("running:", " ".join(shlex.quote(part) for part in args))
              subprocess.run(args, check=True)
              exists = subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "exists", promotion["source_uri"]],
                  check=False,
              )
              if exists.returncode == 0:
                  print(f"deleted scratch source still exists: {promotion['source_uri']}", file=sys.stderr)
                  sys.exit(1)
              if exists.returncode != 1:
                  print(f"could not verify scratch source absence: {promotion['source_uri']}", file=sys.stderr)
                  sys.exit(exists.returncode)
          PY

      - name: Delete approved canonical objects
        if: ${{ needs.reviewed_pr_plans.outputs.has_delete_plan == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shlex
          import subprocess
          import sys

          plan = json.load(open("delete-plan.json"))
          for index, deletion in enumerate(plan["deletions"], start=1):
              print(f"Deleting object {index} of {len(plan['deletions'])}: {deletion['uri']}")
              subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "stat", deletion["uri"]],
                  check=True,
              )
              args = [
                  "uv",
                  "run",
                  "python",
                  "scripts/gcs_asset.py",
                  "delete",
                  deletion["uri"],
                  "--generation",
                  deletion["generation"],
                  "--confirm",
                  "DELETE",
              ]
              print("running:", " ".join(shlex.quote(part) for part in args))
              subprocess.run(args, check=True)
              exists = subprocess.run(
                  ["uv", "run", "python", "scripts/gcs_asset.py", "exists", deletion["uri"]],
                  check=False,
              )
              if exists.returncode == 0:
                  print(f"deleted object still exists: {deletion['uri']}", file=sys.stderr)
                  sys.exit(1)
              if exists.returncode != 1:
                  print(f"could not verify deleted object absence: {deletion['uri']}", file=sys.stderr)
                  sys.exit(exists.returncode)
          PY
