name: Publish TypeScript SDK

on:
  push:
    branches:
      - main
    paths:
      - "api/typescript/package.json"
      - "api/typescript/package-lock.json"
      - ".github/workflows/publish-typescript-sdk.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-typescript-sdk
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: api/typescript/package-lock.json

      - name: Check release version
        id: release-version
        working-directory: api/typescript
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const fs = require("node:fs");

          const outputPath = process.env.GITHUB_OUTPUT;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));

          const parseSemver = (version) => {
            const match = String(version).trim().match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?(?:\+[0-9A-Za-z.-]+)?$/);
            if (!match) {
              throw new Error(`Invalid semver version: ${version}`);
            }
            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              prerelease: match[4] ? match[4].split(".") : []
            };
          };

          const comparePrerelease = (left, right) => {
            if (!left.length && !right.length) return 0;
            if (!left.length) return 1;
            if (!right.length) return -1;
            const length = Math.max(left.length, right.length);
            for (let index = 0; index < length; index += 1) {
              const leftValue = left[index];
              const rightValue = right[index];
              if (leftValue === undefined) return -1;
              if (rightValue === undefined) return 1;
              const leftNumeric = /^\d+$/.test(leftValue);
              const rightNumeric = /^\d+$/.test(rightValue);
              if (leftNumeric && rightNumeric) {
                const difference = Number(leftValue) - Number(rightValue);
                if (difference) return Math.sign(difference);
              } else if (leftNumeric !== rightNumeric) {
                return leftNumeric ? -1 : 1;
              } else if (leftValue !== rightValue) {
                return leftValue < rightValue ? -1 : 1;
              }
            }
            return 0;
          };

          const compareSemver = (left, right) => {
            const parsedLeft = parseSemver(left);
            const parsedRight = parseSemver(right);
            for (const key of ["major", "minor", "patch"]) {
              const difference = parsedLeft[key] - parsedRight[key];
              if (difference) return Math.sign(difference);
            }
            return comparePrerelease(parsedLeft.prerelease, parsedRight.prerelease);
          };

          let publishedVersion = "";
          try {
            publishedVersion = JSON.parse(
              execFileSync("npm", ["view", pkg.name, "version", "--json"], {
                encoding: "utf8",
                stdio: ["ignore", "pipe", "pipe"]
              })
            );
          } catch (error) {
            const stderr = String(error.stderr || "");
            const packageMissing = error.status === 1 && /E404|404 Not Found|is not in this registry/.test(stderr);
            if (!packageMissing) {
              throw error;
            }
          }

          const comparison = publishedVersion ? compareSemver(pkg.version, publishedVersion) : 1;
          if (comparison < 0) {
            throw new Error(`${pkg.name} package.json version ${pkg.version} is lower than published npm version ${publishedVersion}`);
          }

          const shouldPublish = comparison > 0;
          fs.appendFileSync(outputPath, `package_name=${pkg.name}\n`);
          fs.appendFileSync(outputPath, `local_version=${pkg.version}\n`);
          fs.appendFileSync(outputPath, `published_version=${publishedVersion || "none"}\n`);
          fs.appendFileSync(outputPath, `should_publish=${shouldPublish}\n`);
          console.log(
            shouldPublish
              ? `Publishing ${pkg.name} ${pkg.version}; published version is ${publishedVersion || "none"}.`
              : `Skipping publish; ${pkg.name} ${pkg.version} is already published.`
          );
          NODE

      - name: Install dependencies
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm ci

      - name: Test package
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm test

      - name: Verify package contents
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm pack --dry-run

      - name: Publish package
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm publish --access public
