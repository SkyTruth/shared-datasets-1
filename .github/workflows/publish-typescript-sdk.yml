name: Publish TypeScript SDK

on:
  push:
    branches:
      - main
    paths:
      - "api/typescript/src/**"
      - "api/typescript/README.md"
      - "api/typescript/package.json"
      - "api/typescript/package-lock.json"
      - "api/typescript/tsconfig.json"
      - ".github/workflows/publish-typescript-sdk.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "24"

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-typescript-sdk
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allow package metadata bump
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: api/typescript/package-lock.json

      - name: Check release version
        id: release-version
        working-directory: api/typescript
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const fs = require("node:fs");

          const outputPath = process.env.GITHUB_OUTPUT;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const eventPath = process.env.GITHUB_EVENT_PATH;
          const eventName = process.env.GITHUB_EVENT_NAME;
          const releasePatterns = [
            "api/typescript/src/",
            "api/typescript/README.md",
            "api/typescript/package.json",
            "api/typescript/package-lock.json",
            "api/typescript/tsconfig.json"
          ];

          const parseSemver = (version) => {
            const match = String(version).trim().match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?(?:\+[0-9A-Za-z.-]+)?$/);
            if (!match) {
              throw new Error(`Invalid semver version: ${version}`);
            }
            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              prerelease: match[4] ? match[4].split(".") : []
            };
          };

          const comparePrerelease = (left, right) => {
            if (!left.length && !right.length) return 0;
            if (!left.length) return 1;
            if (!right.length) return -1;
            const length = Math.max(left.length, right.length);
            for (let index = 0; index < length; index += 1) {
              const leftValue = left[index];
              const rightValue = right[index];
              if (leftValue === undefined) return -1;
              if (rightValue === undefined) return 1;
              const leftNumeric = /^\d+$/.test(leftValue);
              const rightNumeric = /^\d+$/.test(rightValue);
              if (leftNumeric && rightNumeric) {
                const difference = Number(leftValue) - Number(rightValue);
                if (difference) return Math.sign(difference);
              } else if (leftNumeric !== rightNumeric) {
                return leftNumeric ? -1 : 1;
              } else if (leftValue !== rightValue) {
                return leftValue < rightValue ? -1 : 1;
              }
            }
            return 0;
          };

          const compareSemver = (left, right) => {
            const parsedLeft = parseSemver(left);
            const parsedRight = parseSemver(right);
            for (const key of ["major", "minor", "patch"]) {
              const difference = parsedLeft[key] - parsedRight[key];
              if (difference) return Math.sign(difference);
            }
            return comparePrerelease(parsedLeft.prerelease, parsedRight.prerelease);
          };

          const bumpVersion = (version, bumpType) => {
            const parsed = parseSemver(version);
            if (bumpType === "major") {
              return `${parsed.major + 1}.0.0`;
            }
            if (bumpType === "minor") {
              return `${parsed.major}.${parsed.minor + 1}.0`;
            }
            return `${parsed.major}.${parsed.minor}.${parsed.patch + 1}`;
          };

          const readEvent = () => {
            if (!eventPath || !fs.existsSync(eventPath)) return {};
            return JSON.parse(fs.readFileSync(eventPath, "utf8"));
          };

          const changedFiles = (event) => {
            const files = new Set();
            for (const commit of event.commits || []) {
              for (const field of ["added", "modified", "removed"]) {
                for (const file of commit[field] || []) {
                  files.add(file);
                }
              }
            }
            return [...files];
          };

          const requestedBumpType = (event) => {
            const messages = (event.commits || []).map((commit) => commit.message || "").join("\n");
            const match = messages.match(/(?:typescript-sdk-release|typescript-sdk-bump):\s*(major|minor|patch)|\[typescript-sdk:(major|minor|patch)\]/i);
            return (match?.[1] || match?.[2] || "minor").toLowerCase();
          };

          let publishedVersion = "";
          try {
            publishedVersion = JSON.parse(
              execFileSync("npm", ["view", pkg.name, "version", "--json"], {
                encoding: "utf8",
                stdio: ["ignore", "pipe", "pipe"]
              })
            );
          } catch (error) {
            const stderr = String(error.stderr || "");
            const packageMissing = error.status === 1 && /E404|404 Not Found|is not in this registry/.test(stderr);
            if (!packageMissing) {
              throw error;
            }
          }

          const event = readEvent();
          const packageContentChanged =
            eventName === "push" &&
            changedFiles(event).some((file) => releasePatterns.some((pattern) => file === pattern || file.startsWith(pattern)));
          const comparison = publishedVersion ? compareSemver(pkg.version, publishedVersion) : 1;
          const shouldBump = comparison <= 0 && packageContentChanged;
          const bumpType = shouldBump ? requestedBumpType(event) : "";
          const bumpBaseVersion =
            publishedVersion && compareSemver(publishedVersion, pkg.version) >= 0 ? publishedVersion : pkg.version;
          const targetVersion = shouldBump ? bumpVersion(bumpBaseVersion, bumpType) : pkg.version;
          const shouldPublish = shouldBump || comparison > 0;
          fs.appendFileSync(outputPath, `package_name=${pkg.name}\n`);
          fs.appendFileSync(outputPath, `local_version=${pkg.version}\n`);
          fs.appendFileSync(outputPath, `published_version=${publishedVersion || "none"}\n`);
          fs.appendFileSync(outputPath, `target_version=${targetVersion}\n`);
          fs.appendFileSync(outputPath, `should_bump=${shouldBump}\n`);
          fs.appendFileSync(outputPath, `should_publish=${shouldPublish}\n`);
          console.log(
            shouldBump
              ? `Bumping ${pkg.name} from ${pkg.version} to ${targetVersion} before publish; published version is ${publishedVersion || "none"}.`
              : shouldPublish
                ? `Publishing ${pkg.name} ${pkg.version}; published version is ${publishedVersion || "none"}.`
                : `Skipping publish; no package-content change requires a new version and ${pkg.name} ${pkg.version} is already published.`
          );
          NODE

      - name: Bump package metadata
        if: steps.release-version.outputs.should_bump == 'true'
        working-directory: api/typescript
        run: |
          npm version --no-git-tag-version "${{ steps.release-version.outputs.target_version }}"
          git add package.json package-lock.json
          git commit -m "Bump TypeScript SDK to ${{ steps.release-version.outputs.target_version }} [skip ci]"
          git push

      - name: Install dependencies
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm ci

      - name: Test package
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm test

      - name: Verify package contents
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm pack --dry-run

      - name: Publish package
        if: steps.release-version.outputs.should_publish == 'true'
        working-directory: api/typescript
        run: npm publish --access public
