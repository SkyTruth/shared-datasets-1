name: Deploy Feature Branch to Preview

on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  REGION: us-central1
  ARTIFACT_REGISTRY_REPOSITORY: shared-datasets-jobs
  IMAGE_NAME: preview-service
  CATALOG_VIEWER_IMAGE_NAME: preview-catalog-viewer
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1-preview
  INDEX_LOADER_SERVICE_ACCOUNT: feature-preview-loader@shared-datasets-1.iam.gserviceaccount.com
  CATALOG_WEB_CACHE_CONTROL: "no-cache, max-age=0, must-revalidate"
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  preview:
    name: Deploy selected branch to preview
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: feature-branch-preview
      cancel-in-progress: false

    env:
      PREVIEW_REF: ${{ github.ref_name }}
      PREVIEW_SOURCE_REF: ${{ github.ref }}

    steps:
      - name: Validate selected ref
        run: |
          set -euo pipefail

          if [[ -z "${PREVIEW_SOURCE_REF}" || -z "${PREVIEW_REF}" ]]; then
            echo "Select the branch or tag to deploy from the workflow branch dropdown." >&2
            exit 1
          fi
          case "${PREVIEW_SOURCE_REF}" in
            refs/heads/*|refs/tags/*) ;;
            *)
              echo "Only branch or tag refs are valid preview deploy sources; select a branch or tag." >&2
              exit 1
              ;;
          esac

      - name: Check out preview control plane
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check out selected feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: preview-source

      - name: Record checked-out SHA
        run: echo "PREVIEW_DEPLOY_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
        working-directory: preview-source

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync selected branch dependencies
        run: uv sync --frozen
        working-directory: preview-source

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate preview IAM bootstrap
        run: |
          set -euo pipefail

          preview_service_account="feature-preview-service@${GOOGLE_CLOUD_PROJECT}.iam.gserviceaccount.com"
          preview_loader_service_account="feature-preview-loader@${GOOGLE_CLOUD_PROJECT}.iam.gserviceaccount.com"
          preview_database="projects/${GOOGLE_CLOUD_PROJECT}/databases/feature-preview"
          project_number="$(gcloud projects describe "${GOOGLE_CLOUD_PROJECT}" --format='value(projectNumber)')"
          preview_loader_wif_member="principal://iam.googleapis.com/projects/${project_number}/locations/global/workloadIdentityPools/github/subject/repo:SkyTruth/shared-datasets-1:environment:shared-datasets-production"

          missing_bootstrap=0
          if ! gcloud iam service-accounts describe "${preview_service_account}" --project="${GOOGLE_CLOUD_PROJECT}" >/dev/null; then
            echo "Missing preview service account: ${preview_service_account}" >&2
            missing_bootstrap=1
          fi
          if ! gcloud iam service-accounts describe "${preview_loader_service_account}" --project="${GOOGLE_CLOUD_PROJECT}" >/dev/null; then
            echo "Missing preview loader service account: ${preview_loader_service_account}" >&2
            missing_bootstrap=1
          fi
          if [[ "${missing_bootstrap}" == "1" ]]; then
            echo "Preview IAM bootstrap is incomplete. Run the protected 'Preview Terraform IAM sync' workflow first." >&2
            exit 1
          fi

          gcloud projects get-iam-policy "${GOOGLE_CLOUD_PROJECT}" --format=json > "${RUNNER_TEMP}/preview-project-iam.json"
          gcloud iam service-accounts get-iam-policy "${preview_service_account}" \
            --project="${GOOGLE_CLOUD_PROJECT}" \
            --format=json > "${RUNNER_TEMP}/preview-service-iam.json"
          gcloud iam service-accounts get-iam-policy "${preview_loader_service_account}" \
            --project="${GOOGLE_CLOUD_PROJECT}" \
            --format=json > "${RUNNER_TEMP}/preview-loader-iam.json"
          export PREVIEW_LOADER_WIF_MEMBER="${preview_loader_wif_member}"

          python - "${RUNNER_TEMP}/preview-project-iam.json" "${RUNNER_TEMP}/preview-service-iam.json" "${RUNNER_TEMP}/preview-loader-iam.json" <<'PY'
          import json
          import os
          import sys

          project_policy = json.load(open(sys.argv[1]))
          service_policy = json.load(open(sys.argv[2]))
          loader_policy = json.load(open(sys.argv[3]))
          project = os.environ["GOOGLE_CLOUD_PROJECT"]
          terraform_service_account = os.environ["TERRAFORM_SERVICE_ACCOUNT"]
          preview_database = f"projects/{project}/databases/feature-preview"
          preview_service_member = f"serviceAccount:feature-preview-service@{project}.iam.gserviceaccount.com"
          preview_loader_member = f"serviceAccount:feature-preview-loader@{project}.iam.gserviceaccount.com"
          preview_terraform_role = f"projects/{project}/roles/sharedDatasetsPreviewTerraform"
          preview_sign_blob_role = f"projects/{project}/roles/sharedDatasetsCatalogViewerSignBlob"
          loader_wif_member = os.environ["PREVIEW_LOADER_WIF_MEMBER"]

          def project_binding_exists(role, member, condition_title=None):
              for binding in project_policy.get("bindings", []):
                  if binding.get("role") != role or member not in binding.get("members", []):
                      continue
                  if condition_title is None:
                      return True
                  condition = binding.get("condition") or {}
                  if condition.get("title") != condition_title:
                      continue
                  if preview_database in condition.get("expression", ""):
                      return True
              return False

          def service_account_binding_exists(policy, role, member):
              return any(
                  binding.get("role") == role and member in binding.get("members", [])
                  for binding in policy.get("bindings", [])
              )

          missing = []
          if not project_binding_exists(preview_terraform_role, f"serviceAccount:{terraform_service_account}"):
              missing.append("preview Terraform custom role binding")
          if not project_binding_exists("roles/datastore.viewer", preview_service_member, "preview_firestore_read"):
              missing.append("preview service Firestore read binding")
          if not project_binding_exists("roles/datastore.user", preview_loader_member, "preview_firestore_write"):
              missing.append("preview loader Firestore write binding")
          if not service_account_binding_exists(service_policy, preview_sign_blob_role, preview_service_member):
              missing.append("preview service self signBlob binding")
          if not service_account_binding_exists(loader_policy, "roles/iam.workloadIdentityUser", loader_wif_member):
              missing.append("preview loader Workload Identity binding")

          if missing:
              print("Preview IAM bootstrap is incomplete. Run the protected 'Preview Terraform IAM sync' workflow first.")
              for item in missing:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Verify selected feature branch contains preview services
        run: |
          set -euo pipefail

          test -f preview-source/services/feature_preview_service/Dockerfile
          if ! grep -q "FEATURE_PREVIEW_FIRESTORE_DATABASE" preview-source/services/feature_preview_service/run.py; then
            echo "The selected feature branch must support the preview Firestore database override before it can run in preview." >&2
            exit 1
          fi
          test -f preview-source/services/catalog_viewer/Dockerfile
          if ! grep -q "SHARED_DATASETS_SITE_PREFIX" preview-source/services/catalog_viewer/run.py; then
            echo "The selected feature branch must support the catalog viewer site-prefix override before it can run in preview." >&2
            exit 1
          fi

      - name: Build preview service image
        run: |
          set -euo pipefail

          safe_ref="$(printf '%s' "${PREVIEW_REF}" | tr -c 'A-Za-z0-9_.-' '-' | cut -c 1-80)"
          safe_ref="${safe_ref#-}"
          safe_ref="${safe_ref%-}"
          if [[ -z "${safe_ref}" ]]; then
            safe_ref="ref"
          fi

          image_tag="${REGION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:preview-${safe_ref}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker build \
            --platform linux/amd64 \
            -f preview-source/services/feature_preview_service/Dockerfile \
            -t "${image_tag}" \
            preview-source
          docker push "${image_tag}"
          image_digest="$(gcloud artifacts docker images describe "${image_tag}" --format='value(image_summary.fully_qualified_digest)')"
          if [[ -z "${image_digest}" || "${image_digest}" != *@sha256:* ]]; then
            echo "Could not resolve immutable image digest for ${image_tag}" >&2
            exit 1
          fi
          echo "SAFE_PREVIEW_REF=${safe_ref}" >> "${GITHUB_ENV}"
          echo "PREVIEW_SERVICE_IMAGE=${image_digest}" >> "${GITHUB_ENV}"

      - name: Build preview catalog viewer image
        run: |
          set -euo pipefail

          image_tag="${REGION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${ARTIFACT_REGISTRY_REPOSITORY}/${CATALOG_VIEWER_IMAGE_NAME}:preview-${SAFE_PREVIEW_REF}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker build \
            --platform linux/amd64 \
            -f preview-source/services/catalog_viewer/Dockerfile \
            -t "${image_tag}" \
            preview-source
          docker push "${image_tag}"
          image_digest="$(gcloud artifacts docker images describe "${image_tag}" --format='value(image_summary.fully_qualified_digest)')"
          if [[ -z "${image_digest}" || "${image_digest}" != *@sha256:* ]]; then
            echo "Could not resolve immutable image digest for ${image_tag}" >&2
            exit 1
          fi
          echo "PREVIEW_CATALOG_VIEWER_IMAGE=${image_digest}" >> "${GITHUB_ENV}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/preview init -input=false

      - name: Release stable preview bootstrap state
        run: |
          set -euo pipefail

          bootstrap_addresses=(
            "module.feature_preview_service_account.google_service_account.this"
            "module.feature_preview_loader_service_account.google_service_account.this"
            "google_service_account_iam_member.feature_preview_loader_github_wif"
          )

          for address in "${bootstrap_addresses[@]}"; do
            if terraform -chdir=terraform/envs/preview state list | grep -qx "${address}"; then
              terraform -chdir=terraform/envs/preview state rm "${address}"
            fi
          done

      - name: Terraform reset plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -destroy \
            -input=false \
            -out="${RUNNER_TEMP}/feature-branch-preview-reset.tfplan"

      - name: Export Terraform reset plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan" > "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan.json"

      - name: Terraform apply reset plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan"

      - name: Wait for preview database ID reuse
        run: |
          set -euo pipefail

          wait_required="$(
            python - "${RUNNER_TEMP}/feature-branch-preview-reset.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          for resource in plan.get("resource_changes", []):
              if resource.get("address") != "google_firestore_database.feature_preview":
                  continue
              if resource.get("change", {}).get("actions", []) == ["delete"]:
                  print("1")
                  break
          else:
              print("0")
          PY
          )"

          if [[ "${wait_required}" == "1" ]]; then
            echo "The preview database was deleted during reset; waiting for database ID reuse."
            sleep 330
          else
            echo "The preview database was not deleted during reset; continuing without a reuse wait."
          fi

      - name: Terraform plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -input=false \
            -out="${RUNNER_TEMP}/feature-branch-preview.tfplan" \
            -var="preview_service_image=${PREVIEW_SERVICE_IMAGE}" \
            -var="preview_catalog_viewer_image=${PREVIEW_CATALOG_VIEWER_IMAGE}" \
            -var="preview_ref=${PREVIEW_REF}" \
            -var="preview_deploy_sha=${PREVIEW_DEPLOY_SHA}"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/feature-branch-preview.tfplan" > "${RUNNER_TEMP}/feature-branch-preview.tfplan.json"

      - name: Enforce preview resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/feature-branch-preview.tfplan.json" <<'PY'
          import json
          import re
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_storage_bucket.preview_bucket",
              "google_firestore_database.feature_preview",
              "google_storage_bucket_iam_member.feature_preview_service_object_viewer",
              "google_storage_bucket_iam_member.feature_preview_loader_object_viewer",
              "google_storage_bucket_iam_member.feature_preview_loader_index_load_creator",
              "google_cloud_run_v2_service.feature_preview_service",
              "google_cloud_run_v2_service.feature_preview_catalog_viewer",
              "google_cloud_run_v2_service_iam_member.feature_preview_service_iap_invoker",
              "google_cloud_run_v2_service_iam_member.feature_preview_catalog_viewer_iap_invoker",
          }
          allowed_patterns = [
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.feature_preview_service_accessors\["),
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.feature_preview_catalog_viewer_accessors\["),
          ]
          expected = {
              "bucket": "skytruth-shared-datasets-1-preview",
              "service": "feature-preview-service",
              "catalog_viewer": "feature-preview-catalog-viewer",
              "database": "feature-preview",
              "service_account": "feature-preview-service",
              "index_loader_service_account": "feature-preview-loader",
          }

          def planned_values(resource):
              change = resource.get("change", {})
              for key in ("after", "before"):
                  value = change.get(key)
                  if isinstance(value, dict):
                      return value
              return {}

          def require_value(violations, address, values, key, expected_value):
              actual = values.get(key)
              if actual is not None and actual != expected_value:
                  violations.append(f"{address} {key} is {actual!r}, expected {expected_value!r}")

          def cloud_run_env(values):
              template = values.get("template") or []
              if not template or not isinstance(template, list):
                  return {}
              containers = template[0].get("containers") or []
              if not containers or not isinstance(containers, list):
                  return {}
              env = containers[0].get("env") or []
              return {item.get("name"): item.get("value") for item in env if isinstance(item, dict)}

          blocked = []
          value_violations = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if address in allowed_exact or any(pattern.match(address) for pattern in allowed_patterns):
                  values = planned_values(resource)
                  if address == "google_storage_bucket.preview_bucket":
                      require_value(value_violations, address, values, "name", expected["bucket"])
                  elif address == "google_firestore_database.feature_preview":
                      require_value(value_violations, address, values, "name", expected["database"])
                  elif address == "google_cloud_run_v2_service.feature_preview_service":
                      require_value(value_violations, address, values, "name", expected["service"])
                      env = cloud_run_env(values)
                      if env:
                          if env.get("SHARED_DATASETS_BUCKET") != expected["bucket"]:
                              value_violations.append(f"{address} SHARED_DATASETS_BUCKET must be {expected['bucket']!r}")
                          if env.get("FEATURE_PREVIEW_FIRESTORE_DATABASE") != expected["database"]:
                              value_violations.append(
                                  f"{address} preview Firestore database must be {expected['database']!r}"
                              )
                  elif address == "google_cloud_run_v2_service.feature_preview_catalog_viewer":
                      require_value(value_violations, address, values, "name", expected["catalog_viewer"])
                      env = cloud_run_env(values)
                      if env:
                          if env.get("SHARED_DATASETS_BUCKET") != expected["bucket"]:
                              value_violations.append(f"{address} SHARED_DATASETS_BUCKET must be {expected['bucket']!r}")
                          if env.get("SHARED_DATASETS_SITE_PREFIX") != "_catalog/web":
                              value_violations.append(f"{address} SHARED_DATASETS_SITE_PREFIX must be '_catalog/web'")
                          if env.get("CATALOG_VIEWER_SIGNING_SERVICE_ACCOUNT") != f"{expected['service_account']}@shared-datasets-1.iam.gserviceaccount.com":
                              value_violations.append(f"{address} signer must use the preview service account")
                  elif address == "google_cloud_run_v2_service_iam_member.feature_preview_service_iap_invoker":
                      require_value(value_violations, address, values, "name", expected["service"])
                  elif address == "google_cloud_run_v2_service_iam_member.feature_preview_catalog_viewer_iap_invoker":
                      require_value(value_violations, address, values, "name", expected["catalog_viewer"])
                  elif address.startswith("google_iap_web_cloud_run_service_iam_member.feature_preview_service_accessors"):
                      require_value(value_violations, address, values, "cloud_run_service_name", expected["service"])
                  elif address.startswith("google_iap_web_cloud_run_service_iam_member.feature_preview_catalog_viewer_accessors"):
                      require_value(value_violations, address, values, "cloud_run_service_name", expected["catalog_viewer"])
                  elif address.startswith("google_storage_bucket_iam_member."):
                      require_value(value_violations, address, values, "bucket", expected["bucket"])
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing preview deploy because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          if value_violations:
              print("Refusing preview deploy because an allowlisted resource is not constrained to preview names:")
              for item in value_violations:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply preview plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/feature-branch-preview.tfplan"

      - name: Report preview outputs
        run: |
          terraform -chdir=terraform/envs/preview output preview_service_uri
          terraform -chdir=terraform/envs/preview output preview_catalog_viewer_uri
          terraform -chdir=terraform/envs/preview output preview_bucket
          terraform -chdir=terraform/envs/preview output preview_firestore_database

      - name: Build initial preview catalog web bundle
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/preview-release-indexes"
          uv run python scripts/catalog_site.py \
            --bucket "${SHARED_DATASETS_BUCKET}" \
            --release-index-dir "${RUNNER_TEMP}/preview-release-indexes" \
            --release-index-assets-only \
            --latest-from-release-index \
            --force-access-tier private \
            --out "${RUNNER_TEMP}/preview-catalog-web"
        working-directory: preview-source

      - name: Authenticate as preview catalog publisher
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.INDEX_LOADER_SERVICE_ACCOUNT }}

      - name: Publish initial preview catalog web bundle
        env:
          SHARED_DATASETS_ALLOW_CANONICAL_MUTATION: "1"
        run: |
          set -euo pipefail
          uv run python scripts/catalog_web_publish.py \
            --source "${RUNNER_TEMP}/preview-catalog-web" \
            --destination "gs://${SHARED_DATASETS_BUCKET}/_catalog/web" \
            --cache-control "${CATALOG_WEB_CACHE_CONTROL}"
        working-directory: preview-source
