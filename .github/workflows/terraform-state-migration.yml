name: Terraform State Migration

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type MIGRATE_TERRAFORM_STATE after Storage hardening sync succeeds."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  migrate-prod:
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: prod-terraform-state
      cancel-in-progress: false
    steps:
      - name: Validate reviewed invocation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Terraform state migration may only run from reviewed main." >&2
            exit 1
          fi
          test "${CONFIRMATION}" = "MIGRATE_TERRAFORM_STATE"
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Migrate and verify prod state
        run: scripts/terraform_state_migrate.sh prod terraform/envs/prod

  migrate-preview:
    needs: migrate-prod
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: feature-branch-preview
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Migrate and verify preview state
        run: scripts/terraform_state_migrate.sh preview terraform/envs/preview
