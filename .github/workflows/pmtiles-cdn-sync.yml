name: PMTiles CDN sync

on:
  pull_request:
    branches:
      - main
    paths:
      - "catalog/shared-datasets-catalog.csv"
      - "docs/assets/**"
      - "terraform/envs/prod/catalog_viewer.tf"
      - "terraform/envs/prod/pmtiles_cdn.tf"
      - "terraform/envs/prod/shared_bucket_public.tf"
      - "terraform/envs/prod/variables.tf"
      - "terraform/envs/prod/versions.tf"
  push:
    branches:
      - main
    paths:
      - "catalog/shared-datasets-catalog.csv"
      - "docs/assets/**"
      - "terraform/envs/prod/catalog_viewer.tf"
      - "terraform/envs/prod/pmtiles_cdn.tf"
      - "terraform/envs/prod/shared_bucket_public.tf"
      - "terraform/envs/prod/variables.tf"
      - "terraform/envs/prod/versions.tf"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  readiness:
    name: Check PMTiles CDN sync readiness
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

  sync:
    name: Apply PMTiles CDN route sync
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: prod-terraform-state
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "PMTiles CDN sync may only apply from main after reviewed changes have landed." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/prod init -input=false

      - name: Terraform plan
        run: |
          terraform -chdir=terraform/envs/prod plan \
            -input=false \
            -refresh=false \
            -out="${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan" \
            -target=google_compute_url_map.pmtiles_cdn \
            -target=google_cloud_run_v2_service.catalog_viewer \
            -target=google_secret_manager_secret_iam_member.pmtiles_cdn_catalog_viewer_signer \
            -var="wdpa_monthly_image=unused-by-pmtiles-cdn-sync" \
            -var="sea_ice_daily_image=unused-by-pmtiles-cdn-sync" \
            -var="eamlis_monthly_image=unused-by-pmtiles-cdn-sync"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/prod show -json "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan" > "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan.json"

      - name: Enforce PMTiles resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_compute_url_map.pmtiles_cdn",
              "google_cloud_run_v2_service.catalog_viewer",
              "google_secret_manager_secret_iam_member.pmtiles_cdn_catalog_viewer_signer",
          }

          blocked = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if address in allowed_exact:
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing automatic PMTiles CDN sync because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply
        run: terraform -chdir=terraform/envs/prod apply -input=false "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan"

      - name: Invalidate catalog CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache shared-datasets-pmtiles-cdn \
            --path="/_catalog/*" \
            --project="${GOOGLE_CLOUD_PROJECT}"

      - name: Verify catalog CDN routes
        run: |
          set -euo pipefail

          check_catalog_url() {
            local url="$1"
            local expected_content_type="$2"
            local headers
            local status
            local content_type

            for attempt in {1..12}; do
              headers="$(mktemp)"
              if ! status="$(curl -sS -o /dev/null -D "$headers" -w "%{http_code}" "$url")"; then
                status="curl-error"
              fi
              content_type="$(awk 'BEGIN { IGNORECASE = 1 } /^content-type:/ { print $0 }' "$headers" | tail -n 1 | tr -d '\r')"

              if [[ "$status" == "200" && "$content_type" == *"$expected_content_type"* ]]; then
                echo "$url returned $status with $content_type"
                rm -f "$headers"
                return 0
              fi

              echo "Attempt ${attempt}: $url returned $status with ${content_type:-missing content-type}; expected 200 and ${expected_content_type}"
              cat "$headers"
              rm -f "$headers"
              sleep 10
            done

            echo "Catalog CDN route verification failed for $url" >&2
            return 1
          }

          check_catalog_url "https://tiles.skytruth.org/_catalog/shared-datasets-catalog.csv" "text/csv"
          check_catalog_url "https://tiles.skytruth.org/_catalog/web/catalog.json" "application/json"
          check_catalog_url "https://tiles.skytruth.org/_catalog/web/index.html" "text/html"
