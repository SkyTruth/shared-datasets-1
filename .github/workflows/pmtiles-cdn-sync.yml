name: PMTiles CDN sync

on:
  push:
    branches:
      - main
    paths:
      - "terraform/envs/prod/pmtiles_cdn.tf"
      - "terraform/envs/prod/shared_bucket_public.tf"
      - "terraform/envs/prod/variables.tf"
      - "terraform/envs/prod/versions.tf"
  workflow_run:
    workflows:
      - Catalog web deploy
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  detect_relevant_change:
    name: Detect PMTiles CDN sync need
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 2

      - name: Detect relevant merged changes
        id: filter
        env:
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${WORKFLOW_RUN_CONCLUSION}" != "success" ]]; then
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="$(git diff --name-only HEAD^ HEAD)"
          sync_pattern='^(catalog/shared-datasets-catalog\.csv|docs/assets/|terraform/envs/prod/(pmtiles_cdn|shared_bucket_public|variables|versions)\.tf)$'

          if printf '%s\n' "${changed_files}" | grep -E "${sync_pattern}" >/dev/null; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
          fi

  sync:
    name: Apply PMTiles CDN route sync
    needs: detect_relevant_change
    if: ${{ github.event_name != 'pull_request' && needs.detect_relevant_change.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: prod-terraform-state
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "PMTiles CDN sync may only apply from main after reviewed changes have landed." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/prod init -input=false

      - name: Terraform plan PMTiles managed-folder IAM bootstrap
        run: |
          terraform -chdir=terraform/envs/prod plan \
            -input=false \
            -refresh=false \
            -out="${RUNNER_TEMP}/pmtiles-managed-folder-bootstrap.tfplan" \
            -target=google_project_iam_custom_role.pmtiles_managed_folder_sync \
            -target=google_storage_bucket_iam_member.github_actions_pmtiles_managed_folder_sync \
            -var="wdpa_monthly_image=unused-by-pmtiles-cdn-sync" \
            -var="sea_ice_daily_image=unused-by-pmtiles-cdn-sync" \
            -var="eamlis_monthly_image=unused-by-pmtiles-cdn-sync"

      - name: Export PMTiles managed-folder IAM bootstrap plan JSON
        run: terraform -chdir=terraform/envs/prod show -json "${RUNNER_TEMP}/pmtiles-managed-folder-bootstrap.tfplan" > "${RUNNER_TEMP}/pmtiles-managed-folder-bootstrap.tfplan.json"

      - name: Enforce PMTiles managed-folder IAM bootstrap allowlist
        run: |
          python - "${RUNNER_TEMP}/pmtiles-managed-folder-bootstrap.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_project_iam_custom_role.pmtiles_managed_folder_sync",
              "google_storage_bucket_iam_member.github_actions_pmtiles_managed_folder_sync",
          }

          blocked = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if "delete" in actions:
                  blocked.append(f"{'/'.join(actions)} {address}")
                  continue
              if address in allowed_exact:
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing automatic PMTiles managed-folder IAM bootstrap because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply PMTiles managed-folder IAM bootstrap
        run: terraform -chdir=terraform/envs/prod apply -input=false "${RUNNER_TEMP}/pmtiles-managed-folder-bootstrap.tfplan"

      - name: Wait for PMTiles managed-folder IAM propagation
        run: sleep 30

      - name: Terraform plan
        run: |
          terraform -chdir=terraform/envs/prod plan \
            -input=false \
            -refresh=false \
            -out="${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan" \
            -target=google_compute_url_map.pmtiles_cdn \
            -target=google_storage_managed_folder.shared_bucket_public_prefixes \
            -target=google_storage_managed_folder_iam_member.shared_bucket_public_object_viewers \
            -var="wdpa_monthly_image=unused-by-pmtiles-cdn-sync" \
            -var="sea_ice_daily_image=unused-by-pmtiles-cdn-sync" \
            -var="eamlis_monthly_image=unused-by-pmtiles-cdn-sync"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/prod show -json "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan" > "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan.json"

      - name: Enforce PMTiles resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_compute_url_map.pmtiles_cdn",
              "google_storage_managed_folder.shared_bucket_public_prefixes",
              "google_storage_managed_folder_iam_member.shared_bucket_public_object_viewers",
          }
          managed_folder_prefix = "google_storage_managed_folder.shared_bucket_public_prefixes"
          allowed_for_each_prefixes = {
              "google_storage_managed_folder.shared_bucket_public_prefixes",
              "google_storage_managed_folder_iam_member.shared_bucket_public_object_viewers",
          }

          def is_allowed_address(address):
              if address in allowed_exact:
                  return True
              return any(address.startswith(f"{prefix}[") for prefix in allowed_for_each_prefixes)

          blocked = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if (
                  (address == managed_folder_prefix or address.startswith(f"{managed_folder_prefix}["))
                  and "delete" in actions
              ):
                  blocked.append(f"{'/'.join(actions)} {address}")
                  continue
              if is_allowed_address(address):
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing automatic PMTiles CDN sync because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply
        run: terraform -chdir=terraform/envs/prod apply -input=false "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan"

      - name: Invalidate catalog CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache shared-datasets-pmtiles-cdn \
            --path="/_catalog/*" \
            --project="${GOOGLE_CLOUD_PROJECT}"

      - name: Verify catalog CDN routes
        run: |
          set -euo pipefail

          check_catalog_url() {
            local url="$1"
            local expected_content_type="$2"
            local headers
            local status
            local content_type

            for attempt in {1..12}; do
              headers="$(mktemp)"
              if ! status="$(curl -sS -o /dev/null -D "$headers" -w "%{http_code}" "$url")"; then
                status="curl-error"
              fi
              content_type="$(awk 'BEGIN { IGNORECASE = 1 } /^content-type:/ { print $0 }' "$headers" | tail -n 1 | tr -d '\r')"

              if [[ "$status" == "200" && "$content_type" == *"$expected_content_type"* ]]; then
                echo "$url returned $status with $content_type"
                rm -f "$headers"
                return 0
              fi

              echo "Attempt ${attempt}: $url returned $status with ${content_type:-missing content-type}; expected 200 and ${expected_content_type}"
              cat "$headers"
              rm -f "$headers"
              sleep 10
            done

            echo "Catalog CDN route verification failed for $url" >&2
            return 1
          }

          check_catalog_url "https://tiles.skytruth.org/_catalog/shared-datasets-catalog.csv" "text/csv"
          check_catalog_url "https://tiles.skytruth.org/_catalog/web/catalog.json" "application/json"
          check_catalog_url "https://tiles.skytruth.org/_catalog/web/index.html" "text/html"

          public_metadata_path="$(
            python3 <<'PY'
          import json
          import urllib.request

          release_index_url = "https://tiles.skytruth.org/_catalog/releases/wdpa-marine.json"
          with urllib.request.urlopen(release_index_url, timeout=30) as response:
              release_index = json.load(response)

          def canonical_metadata_path(release):
              for file_entry in release.get("files") or []:
                  file_path = str(file_entry.get("path") or "")
                  file_format = str(file_entry.get("format") or "").lower()
                  file_role = str(file_entry.get("role") or "").lower()
                  if (
                      (file_format == "metadata" or file_role == "metadata")
                      and file_path.startswith("gs://skytruth-shared-datasets-1/")
                      and file_path.endswith(".metadata.ndjson.gz")
                  ):
                      return file_path.removeprefix("gs://skytruth-shared-datasets-1/")
              return None

          candidate_releases = []
          latest_release = release_index.get("latest_release") or {}
          if latest_release:
              candidate_releases.append(latest_release)
          candidate_releases.extend(release_index.get("releases") or [])

          for release in candidate_releases:
              metadata_path = canonical_metadata_path(release)
              if metadata_path:
                  print(metadata_path)
                  break
          else:
              raise SystemExit("WDPA marine release index does not include a canonical metadata sidecar in any release")
          PY
          )"

          check_public_artifact_url() {
            local url="$1"
            local headers
            local status
            local location

            for attempt in {1..12}; do
              headers="$(mktemp)"
              if ! status="$(curl -sS -o /dev/null -D "$headers" -w "%{http_code}" "$url")"; then
                status="curl-error"
              fi
              location="$(awk 'BEGIN { IGNORECASE = 1 } /^location:/ { print $0 }' "$headers" | tail -n 1 | tr -d '\r')"

              if [[ "$status" == "200" && -z "$location" ]]; then
                echo "$url returned $status without redirect"
                rm -f "$headers"
                return 0
              fi

              echo "Attempt ${attempt}: $url returned $status with ${location:-no redirect header}; expected 200 without redirect"
              cat "$headers"
              rm -f "$headers"
              sleep 10
            done

            echo "Public metadata artifact route verification failed for $url" >&2
            return 1
          }

          check_public_artifact_url "https://tiles.skytruth.org/artifacts/${public_metadata_path}"
