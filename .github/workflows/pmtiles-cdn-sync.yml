name: PMTiles CDN sync

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pmtiles-cdn-sync.yml"
      - "catalog/shared-datasets-catalog.csv"
      - "docs/assets/**"
      - "terraform/envs/prod/pmtiles_cdn.tf"
      - "terraform/envs/prod/shared_bucket_public.tf"
      - "terraform/envs/prod/variables.tf"
      - "terraform/envs/prod/versions.tf"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pmtiles-cdn-sync.yml"
      - "catalog/shared-datasets-catalog.csv"
      - "docs/assets/**"
      - "terraform/envs/prod/pmtiles_cdn.tf"
      - "terraform/envs/prod/shared_bucket_public.tf"
      - "terraform/envs/prod/variables.tf"
      - "terraform/envs/prod/versions.tf"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  readiness:
    name: Check PMTiles CDN sync readiness
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

  sync:
    name: Apply PMTiles CDN route sync
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: pmtiles-cdn-sync
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER or GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Read current ingestion images
        id: images
        run: |
          set -euo pipefail
          echo "wdpa_monthly_image=$(gcloud run jobs describe wdpa-monthly --region=us-central1 --project=${GOOGLE_CLOUD_PROJECT} --format='value(spec.template.spec.template.spec.containers[0].image)')" >> "${GITHUB_OUTPUT}"
          echo "sea_ice_daily_image=$(gcloud run jobs describe sea-ice-daily --region=us-central1 --project=${GOOGLE_CLOUD_PROJECT} --format='value(spec.template.spec.template.spec.containers[0].image)')" >> "${GITHUB_OUTPUT}"
          echo "eamlis_monthly_image=$(gcloud run jobs describe eamlis-monthly --region=us-central1 --project=${GOOGLE_CLOUD_PROJECT} --format='value(spec.template.spec.template.spec.containers[0].image)')" >> "${GITHUB_OUTPUT}"

      - name: Terraform init
        run: terraform -chdir=terraform/envs/prod init -input=false

      - name: Terraform plan
        run: |
          terraform -chdir=terraform/envs/prod plan \
            -input=false \
            -out="${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan" \
            -var="wdpa_monthly_image=${{ steps.images.outputs.wdpa_monthly_image }}" \
            -var="sea_ice_daily_image=${{ steps.images.outputs.sea_ice_daily_image }}" \
            -var="eamlis_monthly_image=${{ steps.images.outputs.eamlis_monthly_image }}"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/prod show -json "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan" > "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan.json"

      - name: Enforce PMTiles resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan.json" <<'PY'
          import json
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_compute_url_map.pmtiles_cdn",
              "google_compute_backend_bucket.pmtiles_cdn",
          }
          allowed_prefixes = (
              "google_storage_managed_folder.shared_bucket_public_prefixes",
              "google_storage_managed_folder_iam_member.shared_bucket_public_object_viewers",
          )

          def changed_top_level_keys(before, after):
              before = before or {}
              after = after or {}
              keys = set(before) | set(after)
              return {key for key in keys if before.get(key) != after.get(key)}

          blocked = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if address in allowed_exact or address.startswith(allowed_prefixes):
                  continue
              if address == "google_storage_bucket.shared_bucket":
                  changed = changed_top_level_keys(
                      resource.get("change", {}).get("before"),
                      resource.get("change", {}).get("after"),
                  )
                  if changed <= {"cors"}:
                      continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing automatic PMTiles CDN sync because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply
        run: terraform -chdir=terraform/envs/prod apply -input=false "${RUNNER_TEMP}/pmtiles-cdn-sync.tfplan"
