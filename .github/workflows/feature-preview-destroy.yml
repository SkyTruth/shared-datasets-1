name: Destroy Preview Environment

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shared-datasets-1
  SHARED_DATASETS_BUCKET: skytruth-shared-datasets-1-preview
  INDEX_LOADER_SERVICE_ACCOUNT: feature-preview-loader@shared-datasets-1.iam.gserviceaccount.com
  FEATURE_PREVIEW_FIRESTORE_DATABASE: feature-preview
  FEATURE_PREVIEW_COLLECTION_ROOT: feature_preview_index
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  TERRAFORM_VERSION: "1.8.5"
  TERRAFORM_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
  TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

jobs:
  destroy:
    name: Destroy feature branch preview
    runs-on: ubuntu-latest
    environment: shared-datasets-production
    concurrency:
      group: feature-branch-preview
      cancel-in-progress: false

    steps:
      - name: Validate main ref
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Destroy Preview Environment may only apply from main after reviewed changes have landed." >&2
            exit 1
          fi

      - name: Check out preview control plane
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Validate Terraform auth configuration
        run: |
          set -euo pipefail

          if [[ -z "${TERRAFORM_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${TERRAFORM_SERVICE_ACCOUNT}" ]]; then
            echo "Missing repository variable: GCP_TERRAFORM_SERVICE_ACCOUNT" >&2
            exit 1
          fi

      - name: Authenticate as preview loader
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.INDEX_LOADER_SERVICE_ACCOUNT }}

      - name: Reset stable preview data
        run: uv run python scripts/feature_preview_reset.py

      - name: Authenticate to Google Cloud for Terraform
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.TERRAFORM_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform -chdir=terraform/envs/preview init -input=false

      - name: Terraform destroy plan
        run: |
          set -euo pipefail

          terraform -chdir=terraform/envs/preview plan \
            -destroy \
            -input=false \
            -out="${RUNNER_TEMP}/feature-branch-preview-destroy.tfplan"

      - name: Export Terraform plan JSON
        run: terraform -chdir=terraform/envs/preview show -json "${RUNNER_TEMP}/feature-branch-preview-destroy.tfplan" > "${RUNNER_TEMP}/feature-branch-preview-destroy.tfplan.json"

      - name: Enforce preview resource-change allowlist
        run: |
          python - "${RUNNER_TEMP}/feature-branch-preview-destroy.tfplan.json" <<'PY'
          import json
          import re
          import sys

          plan = json.load(open(sys.argv[1]))
          allowed_exact = {
              "google_cloud_run_v2_service.feature_preview_service",
              "google_cloud_run_v2_service.feature_preview_catalog_viewer",
              "google_cloud_run_v2_service_iam_member.feature_preview_service_iap_invoker",
              "google_cloud_run_v2_service_iam_member.feature_preview_catalog_viewer_iap_invoker",
          }
          allowed_patterns = [
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.feature_preview_service_accessors\["),
              re.compile(r"^google_iap_web_cloud_run_service_iam_member\.feature_preview_catalog_viewer_accessors\["),
          ]
          expected = {
              "bucket": "skytruth-shared-datasets-1-preview",
              "service": "feature-preview-service",
              "catalog_viewer": "feature-preview-catalog-viewer",
              "database": "feature-preview",
          }

          def planned_values(resource):
              change = resource.get("change", {})
              for key in ("after", "before"):
                  value = change.get(key)
                  if isinstance(value, dict):
                      return value
              return {}

          def require_value(violations, address, values, key, expected_value):
              actual = values.get(key)
              if actual is not None and actual != expected_value:
                  violations.append(f"{address} {key} is {actual!r}, expected {expected_value!r}")

          blocked = []
          value_violations = []
          for resource in plan.get("resource_changes", []):
              actions = resource.get("change", {}).get("actions", [])
              if actions in ([], ["no-op"], ["read"]):
                  continue
              address = resource.get("address", "")
              if actions != ["delete"]:
                  blocked.append(f"{'/'.join(actions)} {address}")
                  continue
              if address in allowed_exact or any(pattern.match(address) for pattern in allowed_patterns):
                  values = planned_values(resource)
                  if address == "google_cloud_run_v2_service.feature_preview_service":
                      require_value(value_violations, address, values, "name", expected["service"])
                  elif address == "google_cloud_run_v2_service.feature_preview_catalog_viewer":
                      require_value(value_violations, address, values, "name", expected["catalog_viewer"])
                  elif address == "google_cloud_run_v2_service_iam_member.feature_preview_service_iap_invoker":
                      require_value(value_violations, address, values, "name", expected["service"])
                  elif address == "google_cloud_run_v2_service_iam_member.feature_preview_catalog_viewer_iap_invoker":
                      require_value(value_violations, address, values, "name", expected["catalog_viewer"])
                  elif address.startswith("google_iap_web_cloud_run_service_iam_member.feature_preview_service_accessors"):
                      require_value(value_violations, address, values, "cloud_run_service_name", expected["service"])
                  elif address.startswith("google_iap_web_cloud_run_service_iam_member.feature_preview_catalog_viewer_accessors"):
                      require_value(value_violations, address, values, "cloud_run_service_name", expected["catalog_viewer"])
                  continue
              blocked.append(f"{'/'.join(actions)} {address}")

          if blocked:
              print("Refusing preview destroy because the Terraform plan changes non-allowlisted resources:")
              for item in blocked:
                  print(f"- {item}")
              raise SystemExit(1)
          if value_violations:
              print("Refusing preview destroy because an allowlisted resource is not constrained to preview names:")
              for item in value_violations:
                  print(f"- {item}")
              raise SystemExit(1)
          PY

      - name: Terraform apply destroy plan
        run: terraform -chdir=terraform/envs/preview apply -input=false "${RUNNER_TEMP}/feature-branch-preview-destroy.tfplan"
