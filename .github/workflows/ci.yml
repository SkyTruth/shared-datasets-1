name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_CACHE_DIR: .uv-cache
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run full-history secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Fetch PR base for admission check
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/typescript/package-lock.json

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Install TypeScript package dependencies
        working-directory: api/typescript
        run: npm ci

      - name: Check dataset admission evidence
        if: github.event_name == 'pull_request'
        run: |
          uv run python scripts/admission_check.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head HEAD \
            --event-path "$GITHUB_EVENT_PATH"

      - name: Check repo guardrails for this diff
        if: github.event_name == 'pull_request'
        run: |
          uv run python scripts/repo_guardrails.py check-diff \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head HEAD \
            --event-path "$GITHUB_EVENT_PATH"

      - name: Check generated catalog and asset docs
        run: uv run python scripts/catalog_docs.py check

      - name: Check static repo guardrails
        run: uv run python scripts/repo_guardrails.py check-static

      - name: Run tests
        run: |
          mkdir -p test-results
          uv run pytest --junitxml=test-results/pytest.xml

      - name: Run TypeScript package tests
        working-directory: api/typescript
        run: npm test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/pytest.xml
          if-no-files-found: ignore

  geospatial-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect geospatial changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          geospatial_pattern='^(\.github/(docker/geospatial-ci\.Dockerfile|workflows/ci\.yml)|ingestion/.*|scripts/(vector_asset|raster_asset|dataset_alerts)\.py|tests/test_(raster_standards|wdpa_monthly|sea_ice_daily|eamlis_monthly)\.py)$'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          else
            changed_files=""
          fi

          if printf '%s\n' "$changed_files" | grep -E "$geospatial_pattern" >/dev/null; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  geospatial-integration:
    needs: geospatial-changes
    if: needs.geospatial-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build geospatial CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/geospatial-ci.Dockerfile
          tags: shared-datasets-geospatial-ci:latest
          load: true
          cache-from: type=gha,scope=geospatial-ci
          cache-to: type=gha,mode=max,scope=geospatial-ci,ignore-error=true

      - name: Run geospatial integration tests
        run: |
          mkdir -p test-results
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e UV_CACHE_DIR=.uv-cache \
            -e UV_LINK_MODE=copy \
            -e UV_PROJECT_ENVIRONMENT=/tmp/shared-datasets-geospatial-venv \
            -e RUN_GDAL_INTEGRATION_TESTS=1 \
            shared-datasets-geospatial-ci \
            bash -lc 'uv sync --locked --all-groups && uv run pytest tests/test_raster_standards.py tests/test_wdpa_monthly.py tests/test_sea_ice_daily.py tests/test_eamlis_monthly.py --junitxml=test-results/geospatial-pytest.xml'

      - name: Upload geospatial test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: geospatial-pytest-results
          path: test-results/geospatial-pytest.xml
          if-no-files-found: ignore
